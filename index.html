<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textbausteine · Luis Perez · Chirurgie</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#484f58;
  --accent:#58a6ff;--accent2:#79c0ff;--accentbg:rgba(88,166,255,0.1);
  --green:#3fb950;--greenbg:rgba(63,185,80,0.1);
  --yellow:#d29922;--yellowbg:rgba(210,153,34,0.1);
  --red:#f85149;--redbg:rgba(248,81,73,0.1);
  --purple:#bc8cff;--purplebg:rgba(188,140,255,0.1);
  --text1:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --radius:8px;--radius2:12px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text1);font-family:var(--font);font-size:14px}

/* LAYOUT */
#shell{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* SIDEBAR */
#sidebar-header{padding:14px 12px 10px;border-bottom:1px solid var(--border)}
#sidebar-logo{font-size:12px;font-weight:600;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
#sidebar-logo::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
#sidebar-sub{font-size:11px;color:var(--text2);margin-top:2px}
#sidebar-search{padding:8px 10px;border-bottom:1px solid var(--border)}
#sidebar-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text1);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none}
#sidebar-search input:focus{border-color:var(--accent)}
#sidebar-search input::placeholder{color:var(--text3)}
#nav-list{flex:1;overflow-y:auto;padding:6px 0}
#nav-list::-webkit-scrollbar{width:3px}
#nav-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.nav-group-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:10px 12px 4px}
.nav-btn{display:block;width:100%;background:none;border:none;border-left:2px solid transparent;padding:6px 12px;font-family:var(--font);font-size:12px;color:var(--text2);text-align:left;cursor:pointer;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-btn:hover{color:var(--text1);background:var(--bg3)}
.nav-btn.active{color:var(--accent2);border-left-color:var(--accent);background:var(--accentbg)}

/* TOPBAR */
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
#search-main{flex:1;position:relative}
#search-main input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text1);font-family:var(--font);font-size:13px;padding:7px 12px 7px 32px;outline:none;transition:border-color .15s}
#search-main input:focus{border-color:var(--accent)}
#search-main input::placeholder{color:var(--text3)}
#search-main .s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
#badge-count{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--text2);white-space:nowrap}
#chat-toggle-btn{background:var(--purplebg);border:1px solid var(--purple);border-radius:6px;color:var(--purple);font-family:var(--font);font-size:12px;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:all .15s}
#chat-toggle-btn:hover{background:rgba(188,140,255,0.2)}

/* CONTENT */
#content-area{flex:1;overflow-y:auto;padding:16px}
#content-area::-webkit-scrollbar{width:4px}
#content-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* SECTION CARD */
.sec-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:12px;overflow:hidden;scroll-margin-top:10px}
.sec-card:hover{border-color:var(--border2)}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.sec-title{font-size:13px;font-weight:600;color:var(--text1);display:flex;align-items:center;gap:8px}
.sec-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--accentbg);color:var(--accent2)}
.sec-chevron{color:var(--text3);font-size:12px;transition:transform .2s}
.sec-chevron.open{transform:rotate(180deg)}

/* SNIPPET */
.snippet-wrap{padding:8px}
.snippet{display:flex;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .1s;border:1px solid transparent;align-items:flex-start;margin-bottom:4px}
.snippet:hover{background:var(--bg3);border-color:var(--border)}
.snippet-body{flex:1;min-width:0}
.snippet-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.snippet-text{font-family:var(--mono);font-size:11.5px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.snippet-text mark{background:rgba(88,166,255,0.2);color:var(--accent2);border-radius:2px}
.snippet-actions{flex-shrink:0;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.copy-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:4px 9px;color:var(--text2);font-family:var(--font);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.copy-btn:hover{color:var(--text1);border-color:var(--accent)}
.copy-btn.ok{color:var(--green);border-color:var(--green)}

/* LR BUTTONS */
.lr-wrap{display:flex;gap:4px;margin-bottom:6px}
.lr-btn{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:4px 6px;font-family:var(--font);font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s}
.lr-btn.re{color:var(--accent2)}.lr-btn.re:hover{background:var(--accentbg);border-color:var(--accent)}
.lr-btn.li{color:#f0883e}.lr-btn.li:hover{background:rgba(240,136,62,0.1);border-color:#f0883e}
.lr-btn.be{color:var(--green);font-size:9px}.lr-btn.be:hover{background:var(--greenbg);border-color:var(--green)}

/* SUBSECTION */
.sub-label{font-size:10px;font-weight:600;color:var(--accent);padding:8px 10px 2px;text-transform:uppercase;letter-spacing:.07em}

/* CHAT PANEL */
#chat-panel{width:360px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#chat-panel.hidden{display:none}
#chat-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#chat-title{font-size:13px;font-weight:600;color:var(--purple)}
#chat-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px}
#chat-close:hover{color:var(--text1)}
#chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
#chat-messages::-webkit-scrollbar{width:3px}
#chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.msg{max-width:90%;padding:8px 11px;border-radius:8px;font-size:12.5px;line-height:1.6}
.msg.user{background:var(--accentbg);border:1px solid var(--accent);color:var(--text1);align-self:flex-end}
.msg.ai{background:var(--bg3);border:1px solid var(--border);color:var(--text1);align-self:flex-start}
.msg.sys{background:var(--purplebg);border:1px solid var(--purple);color:var(--purple);align-self:center;font-size:11px;text-align:center}
#chat-input-wrap{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px}
#chat-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text1);font-family:var(--font);font-size:12px;padding:7px 10px;outline:none;resize:none}
#chat-input:focus{border-color:var(--purple)}
#chat-send{background:var(--purplebg);border:1px solid var(--purple);border-radius:6px;color:var(--purple);font-family:var(--font);font-size:12px;padding:7px 12px;cursor:pointer}
#chat-send:hover{background:rgba(188,140,255,0.2)}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
</style>
</head>
<body>
<div id="shell">

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo">Textbausteine</div>
    <div id="sidebar-sub">Unfallchirurgie · L. Perez</div>
  </div>
  <div id="sidebar-search"><input type="text" id="side-search" placeholder="Filter…" oninput="filterSidebar(this.value)"></div>
  <div id="nav-list"></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div id="search-main">
      <span class="s-icon">🔍</span>
      <input type="text" id="main-search" placeholder="Baustein suchen…" oninput="filterContent(this.value)">
    </div>
    <div id="badge-count">—</div>
    <button id="chat-toggle-btn" onclick="toggleChat()">🤖 KI-Assistent</button>
  </div>
  <div id="content-area"></div>
</div>

<!-- CHAT PANEL -->
<div id="chat-panel" class="hidden">
  <div id="chat-header">
    <span id="chat-title">🤖 KI-Assistent</span>
    <button id="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-messages">
    <div class="msg sys">Medizinischer KI-Assistent für Chirurgie &amp; Unfallchirurgie. Stelle eine Frage auf Deutsch oder Englisch.</div>
  </div>
  <div id="chat-input-wrap">
    <textarea id="chat-input" rows="2" placeholder="Frage eingeben… (Enter = senden)"></textarea>
    <button id="chat-send" onclick="sendChat()">↑</button>
  </div>
</div>

</div><!-- end shell -->

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const SECTIONS = [

// ── BEFUNDE / UNTERSUCHUNG ───────────────────
{id:'finger', group:'Befunde', label:'Finger', tag:'Untersuchung', snippets:[
  {lr:true, label:'Befund Finger (Grundglied)',
   text:'D ___ re/li: Schwellung +/-, lokaler Druckschmerz +/-, Beweglichkeitseinschränkung im Bereich des Grundglieds des ___ Fingers. Keine Achsabweichung, kein Rotationsfehler in Flexion. 2-Punktdiskriminierung intakt. Stumpf- und Spitzdiskriminierung intakt. Beuge- und Streckfunktionen intakt, keine Sehnenverletzung der tiefen und oberflächlichen Beugesehnen. Motorik, Sensibilität und Durchblutung intakt.'},
  {lr:false, label:'Hand – Kurzbefund',
   text:'Schwellung: ___\nHämatom: ___\nWunden: ___\nFehlstellung: ___\nE/F: ___\nRadial/ulnar Abduktion: ___\nUmwendbewegung: ___\nFaustschluss: ___\nRotationsfehler der Finger: ___\nDruckschmerz: ___\nDruckschmerz der Tabatiere: ___\nDruckschmerz des SL-Spaltes: ___\nBeugen und Strecken der Finger in allen Gliedern gegen Kraft möglich: ___\nBeugen und Strecken des Daumens gegen Kraft möglich: ___\nInstabilität von Fingergelenken: nein'},
]},

{id:'ellenbogen', group:'Befunde', label:'Ellenbogen', tag:'Untersuchung', snippets:[
  {lr:true, label:'Befund Ellenbogen',
   text:'Ellenbogen re/li: Schmerzen +/-, Schwellung +/-, Rötung +/-. Beweglichkeit: Extension/Flexion: ___°/0°/___°. Supination/Pronation: frei/eingeschränkt. Keine Schwellung über den Epicondylen / dem Olecranon. Keine Bursabeteiligung. Periphere Durchblutung, Motorik und Sensibilität intakt.'},
  {lr:false, label:'Platzwunde Olecranon',
   text:'Platzwunde über dem Olecranon re/li. Nicht verschmutzt. Keine Bursabeteiligung. Periphere Durchblutung, Motorik und Sensibilität intakt.'},
]},

{id:'schulter', group:'Befunde', label:'Schulter', tag:'Untersuchung', snippets:[
  {lr:true, label:'Inspektion Schulter',
   text:'Schulter re/li: Unauffällige äußere Erscheinung. Beidseits gleiches Mitschwingen der Arme / Schonhaltung. Keine äußeren Verletzungen, Schwellungen oder Rötungen. Keine Narben, keine Entzündungszeichen. Symmetrische Schulterstellung.'},
  {lr:true, label:'Palpation & Beweglichkeit Schulter',
   text:'Mäßiger Druckschmerz über dem Sternoklavikulargelenk / der Clavicula / dem ACG / dem Acromion / dem Proc. coracoideus / dem Sulcus intertubercularis / dem Tuberculum minus et majus re/li.\nBeweglichkeit Schultergelenk isoliert:\n  Ante-/Retroversion: 90°/0°/30°\n  Ab-/Adduktion: 90°/0°/20°\n  Innen-/Außenrotation (Neutral-0): 70°/0°/60°\n  Innen-/Außenrotation (90° Abd): 70°/0°/70°\nBeweglichkeit mit Schultergürtel:\n  Ante-/Retroversion: 170°/0°/40°\n  Ab-/Adduktion: 180°/0°/40°\n  Innen-/Außenrotation: 95°/0°/80°\nMuskelkraft normal. Neurovaskulär unauffällig.'},
  {lr:true, label:'Spezielle Tests Schulter',
   text:'Nackengriff re/li: pos/neg. Schürzengriff: pos/neg. Codman-Griff: pos/neg.\nJobe-Test (M. supraspinatus): pos/neg.\nLift-Off-Test / Belly-Press-Test (M. subscapularis): pos/neg.\nInfraspinatus-Test: pos/neg.\nPalm-Up-Test / Speed-Test (Bizepssehne): pos/neg.\nPainful-Arc-Test: pos/neg. Neer-Test: pos/neg. Hawkins-Kennedy-Test: pos/neg.\nVordere/hintere Schublade: neg. Sulcus-Zeichen: neg.\nNeurovaskuläre Untersuchung: unauffällig.'},
]},

{id:'handgelenk', group:'Befunde', label:'Handgelenk', tag:'Untersuchung', snippets:[
  {lr:true, label:'Befund Handgelenk – unauffällig',
   text:'Handgelenk re/li: Inspektion unauffällig, keine Verletzungen, Schwellungen oder Rötungen. Palpation: kein Druckschmerz, keine Schwellung. Beweglichkeit: Dorsal-/Palmarflexion und Radial-/Ulnardeviation frei. ROM innerhalb der Norm. Stabilitätstests: keine Instabilität. Griffstärke und Fingerbewegungen normal. Neurovaskulär: Sensibilität intakt, Pulskontrolle an der A. radialis regelrecht.'},
  {lr:true, label:'Druckschmerz Tabatière / Skaphoid',
   text:'Druckschmerz in der Tabatière re/li: +/- . Druckschmerz über dem Skaphoid palmar: +/-. Druckschmerz SL-Spalt: +/-. Kein Rotationsfehler. Faustschluss möglich/eingeschränkt. Periphere DMS intakt.'},
]},

{id:'osg', group:'Befunde', label:'OSG', tag:'Untersuchung', snippets:[
  {lr:true, label:'Befund OSG – unauffällig',
   text:'OSG re/li: Inspektion unauffällig, keine Schwellung, keine Rötung. Gelenkkontur symmetrisch. Palpation: kein Druckschmerz. Beweglichkeit: Dorsalextension/Plantarflexion frei, ROM innerhalb der Norm. Stabilitätstests: kein pathologisches Aufklappen. Muskelkraft regelrecht. Neurovaskulär unauffällig.'},
  {lr:true, label:'OSG Distorsion – typischer Befund',
   text:'OSG re/li: Supinationstrauma. Schwellung im Bereich des lateralen Malleolus. Druckschmerz über dem Lig. fibulotalare anterius / calcaneofibulare. Druckschmerz über Basis Metatarsale V: nein. Kein Druckschmerz Malleolus medialis. Kein Druckschmerz proximale Fibula. Ottawa-Regel: keine Indikation Röntgen / Röntgen veranlasst. Röntgen OSG 2 Eb.: kein Frakturnachweis. Beweglichkeit schmerzhaft eingeschränkt. Sprunggelenk bandstabil / leichte Bandinsuffizienz. Periphere DMS intakt.\nProc: Schonung, Kühlung, Hochlagerung, Tape-Verband/Walker-Schiene. Analgesie Ibuprofen 600 mg 1-1-1. Wiedervorstellung bei Befundverschlechterung.'},
]},

{id:'knie', group:'Befunde', label:'Knie', tag:'Untersuchung', snippets:[
  {lr:true, label:'Befund Knie – unauffällig',
   text:'Knie re/li: Leichte/mäßige Schwellung, kein Hämatom, kein intraartikulärer Erguss. Hautmantel intakt. Keine Deformität. Patellastellung physiologisch. Druckschmerz über dem medialen/lateralen Gelenkspalt / über der Patella. Patellaverschieblichkeit regelrecht. Sehnenansätze regelrecht palpabel. Kniekehle schmerzfrei, keine Zyste. Beweglichkeit: Extension/Flexion ___°/0°/___°. Schubladen-Test: neg. Lachman-Test: neg. Steinmann I: neg. McMurray-Test: neg. Fingernagelprobe 2s, keine Parästhesie. Kraft 5/5.'},
  {lr:true, label:'Knieprellung',
   text:'Knie re/li: Prellmarke / Schürfwunde ___cm. Schwellung +/-. Kein Gelenkerguss. Patellaverschieblichkeit regelrecht. Bandapparat stabil (Lachman neg., Schublade neg., Valgusstress neg., Varusstress neg.). Kein Meniskuszeichen. Beweglichkeit schmerzbedingt eingeschränkt auf ___°/0°/___°. Periphere DMS intakt.'},
]},

{id:'lws', group:'Befunde', label:'LWS', tag:'Untersuchung', snippets:[
  {lr:false, label:'Befund LWS',
   text:'LWS: Klinisch keine Rötung, keine Schwellung, keine Überwärmung. Druck- und Klopfschmerz paravertebral LWK ___. Keine Ausstrahlung / Ausstrahlung in Bein re/li, Dermatom L___.\nLasègue-Zeichen bds. negativ / positiv bei ___°.\nKraft untere Extremität:\n  Zehenheber: 5/5 re – 5/5 li\n  Zehensenker: 5/5 re – 5/5 li\n  Fußheber:   5/5 re – 5/5 li\n  Fußsenker:  5/5 re – 5/5 li\n  Kniestrecker: 5/5 re – 5/5 li\n  Kniebeuger:   5/5 re – 5/5 li\n  Hüftstrecker: 5/5 re – 5/5 li\n  Hüftbeuger:   5/5 re – 5/5 li\nHackengang unauffällig / erschwert. Zehenspitzengang unauffällig / erschwert.\nASR/PSR: vorhanden bds. / abgeschwächt re/li.\nSensibilität: intakt / Parästhesie L___ re/li.\nDurchblutung: kräftig tastbare Pulse ATP und ADP bds. Keine Blasen- oder Mastdarmstörungen.'},
]},

// ── PROZEDERE ───────────────────────────────
{id:'proc-ambulant', group:'Procedere', label:'Proc ambulant (Schmerz)', tag:'Procedere', snippets:[
  {lr:false, label:'Proc ambulant standard',
   text:'Proc:\n• Schonung, Kühlung, Hochlagerung\n• Analgesie bei Bedarf (Ibuprofen 600 mg 1-1-1 p.o. zum Essen)\nBei Befundverschlechterung jederzeitige Wiedervorstellung in der Notaufnahme möglich.\nBei Schmerzpersistenz Wiedervorstellung in der BG-Sprechstunde.\nTelefon BG-Sprechstunde: 09281 982730\nFadenzug in 10 Tagen beim Hausarzt / bei der Hausärztin.\nBei anhaltenden Beschwerden Wiedervorstellung beim niedergelassenen Orthopäden.'},
  {lr:false, label:'Proc stationär (Station)',
   text:'Anordnungen Station:\n• Schonung, Kühlung, Hochlagerung\n• Vitalparameter alle 4 h\n• Häusliche Medikation weiter\n• Analgesie bei Bedarf: Novalgin 1 g i.v. 1-1-1, Dipidolor 7,5 mg i.v. b.B.\n• Thromboembolieprophylaxe: Clexane 0,4 ml s.c. 1×tägl.\nOP heute geplant – bitte nüchtern lassen. Danke!'},
]},

{id:'proc-sht', group:'Procedere', label:'Proc SHT ambulant', tag:'Procedere', snippets:[
  {lr:false, label:'SHT I° – Befund & Proc ambulant',
   text:'Bei der klinischen Untersuchung zeigte sich ein wacher, ansprechbarer Patient. Pupillen isokor und lichtreagibel. Kein Blut oder Liquor aus Nase oder Ohren. Keine Kopfschmerzen, keine Übelkeit, kein Erbrechen, keine Bewusstlosigkeit, keine Amnesie. HWS: Kopf freibeweglich, kein Druck- oder Klopfschmerz.\nBefund: minimales occipitales Hämatom / Schürfwunde ___. Schädelkontusion. GCS 15.\nCCT: kein Hinweis auf intrakranielle Blutung, kein Frakturnachweis.\nProc ambulant:\n• Körperliche Schonung für 24 h\n• Bei Alarmzeichen (Erbrechen, Übelkeit, Bewusstseinstrübung, starke Kopfschmerzen) sofortige Wiedervorstellung oder Notruf 112\n• Merkblatt SHT mitgegeben\n• Analgesie bei Bedarf: Paracetamol 500 mg (kein Ibuprofen/ASS in ersten 24 h)'},
  {lr:false, label:'SHT I° – Proc Kinder (Elternmerkblatt)',
   text:'Anamnese, Untersuchung, Beratung. Aushändigung des Merkblatts für Eltern nach Sturz / Kopftrauma beim Kind. Klinisch kein Hinweis auf intrakranielle Verletzung. GCS 15, Pupillen isokor. Keine Bewusstlosigkeit, keine Amnesie, kein Erbrechen.\nProc:\n• Häusliche Überwachung durch Eltern für 24 h\n• Alle 2 h wecken und auf Ansprechbarkeit prüfen\n• Bei Alarmzeichen: 112 anrufen oder sofortige Wiedervorstellung Notaufnahme\n• Kein Sport, kein Bildschirm für 24 h'},
]},

{id:'schnittwunde', group:'Procedere', label:'Schnittwunde', tag:'Procedere', snippets:[
  {lr:true, label:'Schnittwunde Hand – Naht',

// ─────────────────────────────────────────────
//  BUILD UI
// ─────────────────────────────────────────────
let collapsed = {};
let query = '';

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hl(text, q){
  if(!q) return esc(text);
  const r = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc(text).replace(r, m=>'<mark>'+m+'</mark>');
}

function buildNav(){
  const nav = document.getElementById('nav-list');
  nav.innerHTML='';
  const groups={};
  SECTIONS.forEach(s=>{ if(!groups[s.group]) groups[s.group]=[]; groups[s.group].push(s); });
  Object.keys(groups).forEach(g=>{
    const lbl=document.createElement('div');
    lbl.className='nav-group-label'; lbl.textContent=g;
    nav.appendChild(lbl);
    groups[g].forEach(s=>{
      const btn=document.createElement('button');
      btn.className='nav-btn'; btn.dataset.id=s.id;
      btn.textContent=s.label;
      btn.onclick=()=>{ scrollTo(s.id); setActive(s.id); };
      nav.appendChild(btn);
    });
  });
}

function setActive(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
}

function scrollTo(id){
  const el=document.getElementById('sec-'+id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

function filterSidebar(val){
  const q=val.toLowerCase();
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.style.display = btn.textContent.toLowerCase().includes(q)?'':'none';
  });
  document.querySelectorAll('.nav-group-label').forEach(lbl=>{
    const next=lbl.nextElementSibling;
    lbl.style.display = next&&next.style.display!=='none'?'':'none';
  });
}

function filterContent(val){
  query = val.trim();
  buildContent();
}

function copyText(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('ok');
    btn.textContent='✓ Kopiert';
    setTimeout(()=>{ btn.classList.remove('ok'); btn.innerHTML='📋 Kopieren'; }, 1500);
  });
}

function lrText(text, side){
  // Replace re/li placeholders
  return text
    .replace(/re\/li/g, side)
    .replace(/rechts\/links/gi, side==='re'?'rechts':'links')
    .replace(/Rechts\/Links/g, side==='re'?'Rechts':'Links');
}

function buildSnippet(sn, q){
  const wrap = document.createElement('div');
  wrap.className='snippet';

  const body=document.createElement('div'); body.className='snippet-body';
  if(sn.label){ const lbl=document.createElement('div'); lbl.className='snippet-label'; lbl.textContent=sn.label; body.appendChild(lbl); }
  const pre=document.createElement('div'); pre.className='snippet-text';
  pre.innerHTML=hl(sn.text, q);
  body.appendChild(pre);
  wrap.appendChild(body);

  const actions=document.createElement('div'); actions.className='snippet-actions';

  if(sn.lr){
    const lrw=document.createElement('div'); lrw.className='lr-wrap';
    ['re','li','bds.'].forEach(s=>{
      const b=document.createElement('button');
      b.className='lr-btn '+(s==='re'?'re':s==='li'?'li':'be');
      b.textContent=s.toUpperCase();
      b.title='Text für '+s+' kopieren';
      b.onclick=(e)=>{ e.stopPropagation(); const t=lrText(sn.text,s); navigator.clipboard.writeText(t).then(()=>{ b.textContent='✓'; setTimeout(()=>b.textContent=s.toUpperCase(),1200); }); };
      lrw.appendChild(b);
    });
    actions.appendChild(lrw);
  }

  const cpbtn=document.createElement('button'); cpbtn.className='copy-btn';
  cpbtn.innerHTML='📋 Kopieren';
  cpbtn.onclick=(e)=>{ e.stopPropagation(); copyText(sn.text,cpbtn); };
  actions.appendChild(cpbtn);

  wrap.appendChild(actions);
  wrap.onclick=()=>copyText(sn.text,cpbtn);
  return wrap;
}

function buildContent(){
  const area=document.getElementById('content-area');
  area.innerHTML='';
  let visible=0;
  const q=query.toLowerCase();

  SECTIONS.forEach(sec=>{
    const match = sec.snippets.some(sn=>
      !q || sn.text.toLowerCase().includes(q) || sn.label.toLowerCase().includes(q) || sec.label.toLowerCase().includes(q)
    );
    if(!match) return;
    visible++;

    const card=document.createElement('div'); card.className='sec-card'; card.id='sec-'+sec.id;
    const hdr=document.createElement('div'); hdr.className='sec-header';
    const isOpen=collapsed[sec.id]!==false;
    hdr.innerHTML=`<span class="sec-title"><span class="sec-tag">${esc(sec.tag)}</span>${esc(sec.label)}</span><span class="sec-chevron ${isOpen?'open':''}">▼</span>`;
    hdr.onclick=()=>{ collapsed[sec.id]= collapsed[sec.id]===false; buildContent(); };
    card.appendChild(hdr);

    if(isOpen){
      const wrap=document.createElement('div'); wrap.className='snippet-wrap';
      sec.snippets.forEach(sn=>{
        const ok=!q||sn.text.toLowerCase().includes(q)||sn.label.toLowerCase().includes(q)||sec.label.toLowerCase().includes(q);
        if(ok) wrap.appendChild(buildSnippet(sn,query));
      });
      card.appendChild(wrap);
    }
    area.appendChild(card);
  });

  document.getElementById('badge-count').textContent = q ? visible+' Treffer' : SECTIONS.length+' Kategorien';
}

// ─────────────────────────────────────────────
//  CHAT
// ─────────────────────────────────────────────
function toggleChat(){
  const panel=document.getElementById('chat-panel');
  panel.classList.toggle('hidden');
}

const chatHistory=[];

async function sendChat(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text) return;
  input.value='';

  addMsg(text,'user');
  chatHistory.push({role:'user',content:text});

  const thinking=addMsg('…','ai');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'Du bist ein erfahrener Arzt in Unfallchirurgie und Plastischer Chirurgie. Du hilfst dem Assistenzarzt Luis Perez Rojas bei medizinischen Fragen, Textbausteinen für Arztbriefe, klinischen Entscheidungen und Literatur. Antworte präzise, auf Deutsch (außer du wirst auf Englisch gefragt). Keine langen Einleitungen.',
        messages:chatHistory
      })
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Fehler beim Abrufen der Antwort.';
    thinking.textContent=reply;
    chatHistory.push({role:'assistant',content:reply});
  } catch(e){
    thinking.textContent='Verbindungsfehler. Bitte erneut versuchen.';
  }
}

function addMsg(text, role){
  const box=document.getElementById('chat-messages');
  const msg=document.createElement('div'); msg.className='msg '+role; msg.textContent=text;
  box.appendChild(msg);
  box.scrollTop=box.scrollHeight;
  return msg;
}

document.getElementById('chat-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); }
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
buildNav();
buildContent();
</script>
