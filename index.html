<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Luis Perez · Chirurgie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f3ef;color:#1a1410;font-size:13px;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}

/* SIDEBAR */
#sb{width:210px;flex-shrink:0;background:#1a1410;display:flex;flex-direction:column;overflow:hidden}
#sb-brand{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
#sb-name{font-size:13px;color:#f0e8d8;letter-spacing:.08em;font-weight:400}
#sb-sub{font-size:9px;color:#b8965a;letter-spacing:.3em;text-transform:uppercase;margin-top:4px}
#sb-search{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
#sb-search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:3px;color:#e0d8c8;font-size:11px;padding:5px 8px;outline:none;font-family:inherit}
#sb-search input::placeholder{color:rgba(255,255,255,.2)}
#sb-search input:focus{border-color:#b8965a}
#sb-nav{flex:1;overflow-y:auto;padding:4px 0}
#sb-nav::-webkit-scrollbar{width:2px}
#sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.ng{font-size:8.5px;color:rgba(255,255,255,.18);letter-spacing:.2em;text-transform:uppercase;padding:10px 12px 3px}
.ni{display:block;width:100%;background:none;border:none;border-left:2px solid transparent;padding:6px 12px;font-family:inherit;font-size:11.5px;color:rgba(255,255,255,.38);text-align:left;cursor:pointer;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.ni.on{color:#d4a85a;border-left-color:#b8965a}
.ni.cp{color:#7ab0d8}
.ni.cu{color:#c4906a}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid #e0d8c8;padding:9px 16px;display:flex;align-items:center;gap:8px}
.dtab{background:none;border:1px solid #d8cdb8;border-radius:3px;padding:4px 10px;font-family:inherit;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:#8a7258;transition:all .12s}
.dtab:hover{border-color:#b8965a}
.dtab.on-all{background:#f0e8d8;border-color:#c8b898;color:#3a2a18}
.dtab.on-cp{background:#e8f0f8;border-color:#7aaecc;color:#1a3a5a}
.dtab.on-cu{background:#f8ede8;border-color:#c49070;color:#4a1a08}
#msearch{flex:1;position:relative}
#msearch input{width:100%;background:#f5f0e8;border:1px solid #d8cdb8;border-radius:3px;color:#1a1410;font-family:inherit;font-size:12px;padding:6px 10px 6px 26px;outline:none}
#msearch input:focus{border-color:#b8965a;background:#fff}
#msearch input::placeholder{color:#a09078}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#a09078;font-size:13px;pointer-events:none}
#cnt{font-size:10px;color:#a09078;white-space:nowrap}
#gptbtn{background:#1a1410;border:none;border-radius:3px;color:#d4a85a;font-family:inherit;font-size:9.5px;padding:6px 12px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase}
#gptbtn:hover{background:#302820}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:#d0c8b8;border-radius:3px}

.sec{background:#fff;border:1px solid #e4dac8;border-radius:4px;overflow:hidden;scroll-margin-top:6px}
.sec:hover{border-color:#c8b898}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;cursor:pointer;user-select:none}
.shdr.hcp{background:linear-gradient(90deg,#deeaf8,#f8f8f8)}
.shdr.hcu{background:linear-gradient(90deg,#f8ede0,#f8f8f8)}
.shdr.hge{background:linear-gradient(90deg,#f0ece4,#f8f8f8)}
.stitle{font-size:13px;font-weight:400;color:#1a1410;display:flex;align-items:center;gap:8px}
.bcp{font-size:8px;font-weight:500;padding:2px 6px;border-radius:2px;background:#deeaf8;color:#1a3a5a;letter-spacing:.1em;text-transform:uppercase}
.bcu{font-size:8px;font-weight:500;padding:2px 6px;border-radius:2px;background:#f8ede0;color:#4a1a08;letter-spacing:.1em;text-transform:uppercase}
.bge{font-size:8px;font-weight:500;padding:2px 6px;border-radius:2px;background:#e8e4dc;color:#5a4a38;letter-spacing:.1em;text-transform:uppercase}
.ch{color:#a09078;font-size:10px;transition:transform .18s}
.ch.op{transform:rotate(180deg)}

.slist{padding:6px}
.sn{display:flex;gap:8px;padding:8px 10px;border-radius:3px;cursor:pointer;transition:background .1s;border:1px solid transparent;margin-bottom:4px;align-items:flex-start}
.sn:last-child{margin-bottom:0}
.sn:hover{background:#f5f0e8;border-color:#e4dac8}
.snbody{flex:1;min-width:0}
.snlbl{font-size:8.5px;color:#a09078;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.sntxt{font-family:'Courier New',monospace;font-size:11px;color:#3a2a18;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.sntxt mark{background:rgba(184,150,90,.2);color:#6a4a10;border-radius:2px}
.snacts{flex-shrink:0;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.cob{background:#f0ece4;border:1px solid #d0c8b8;border-radius:3px;padding:3px 9px;color:#5a4a38;font-family:inherit;font-size:10px;cursor:pointer;transition:all .12s;white-space:nowrap}
.cob:hover{background:#1a1410;color:#d4a85a;border-color:#1a1410}
.cob.ok{background:#2a5a2a;color:#fff;border-color:#2a5a2a}
.lrrow{display:flex;gap:3px;margin-bottom:2px}
.lrb{flex:1;background:#fff;border:1px solid #d0c8b8;border-radius:3px;padding:3px 5px;font-family:inherit;font-size:9px;font-weight:500;cursor:pointer;text-align:center;transition:all .12s}
.lre{color:#1a3a5a}.lre:hover{background:#deeaf8;border-color:#7aaecc}
.lrl{color:#4a1a08}.lrl:hover{background:#f8ede0;border-color:#c49070}
.lrb2{color:#7a6a58;font-size:8px}.lrb2:hover{background:#f0ece4}
.mbox{background:#fffce8;border-left:3px solid #c8a000;border-radius:0 3px 3px 0;padding:7px 11px;margin:6px;font-size:11px;color:#5a4a00;line-height:1.6}
.mt{font-size:8px;font-weight:600;color:#8a7000;letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px}
.empty{text-align:center;padding:60px;color:#a09078;font-size:12px}

/* CHAT */
#chat{width:340px;flex-shrink:0;background:#fff;border-left:1px solid #e4dac8;display:flex;flex-direction:column}
#chat.hid{display:none}
#chtop{padding:11px 13px;border-bottom:1px solid #e4dac8;background:#1a1410;display:flex;justify-content:space-between;align-items:center}
#chtop-t{font-size:13px;color:#d4a85a;font-weight:300}
#chtop-s{font-size:8.5px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
#chcl{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:15px}
#chcl:hover{color:#fff}
#chmsg{flex:1;overflow-y:auto;padding:11px;display:flex;flex-direction:column;gap:7px;background:#f5f3ef}
#chmsg::-webkit-scrollbar{width:2px}
.cm{padding:8px 10px;border-radius:4px;font-size:12px;line-height:1.6;max-width:91%}
.cm.u{background:#1a1410;color:#e8dcc8;align-self:flex-end;border-radius:4px 4px 2px 4px}
.cm.a{background:#fff;border:1px solid #e4dac8;color:#1a1410;align-self:flex-start;border-radius:4px 4px 4px 2px}
.cm.s{background:rgba(184,150,90,.1);border:1px solid #e4dac8;color:#8a7258;align-self:center;font-size:10px;text-align:center;padding:5px 10px}
#chfot{padding:9px;border-top:1px solid #e4dac8;background:#fff}
#chkey-row{display:flex;gap:5px;margin-bottom:6px}
#chkey{flex:1;background:#f5f0e8;border:1px solid #d0c8b8;border-radius:3px;color:#1a1410;font-family:'Courier New',monospace;font-size:10px;padding:5px 7px;outline:none}
#chkey:focus{border-color:#b8965a}
#chkey::placeholder{color:#a09078}
.kok{background:#1a1410;border:none;border-radius:3px;color:#d4a85a;font-family:inherit;font-size:10px;padding:5px 10px;cursor:pointer}
#chin-row{display:flex;gap:5px}
#chin{flex:1;background:#f5f0e8;border:1px solid #d0c8b8;border-radius:3px;color:#1a1410;font-family:inherit;font-size:12px;padding:7px 9px;outline:none;resize:none;min-height:36px;max-height:72px}
#chin:focus{border-color:#b8965a;background:#fff}
#chsend{background:#1a1410;border:none;border-radius:3px;color:#d4a85a;font-size:16px;padding:0 12px;cursor:pointer}
#chsend:hover{background:#302820}
</style>
</head>
<body>
<div id="app">

<div id="sb">
  <div id="sb-brand">
    <div id="sb-name">Dr. Luis Perez</div>
    <div id="sb-sub">Plastische Chirurgie</div>
  </div>
  <div id="sb-search"><input type="text" placeholder="Filter…" oninput="navFilter(this.value)"></div>
  <div id="sb-nav"></div>
</div>

<div id="main">
  <div id="topbar">
    <div style="display:flex;gap:5px">
      <button class="dtab on-all" id="ta" onclick="setDep('all')">Alle</button>
      <button class="dtab" id="tp" onclick="setDep('cp')">Plastische</button>
      <button class="dtab" id="tu" onclick="setDep('cu')">Unfall</button>
    </div>
    <div id="msearch"><span class="si">⌕</span><input type="text" placeholder="Baustein suchen…" oninput="doSearch(this.value)"></div>
    <span id="cnt"></span>
    <button id="gptbtn" onclick="toggleChat()">GPT · KI</button>
  </div>
  <div id="content"></div>
</div>

<div id="chat" class="hid">
  <div id="chtop">
    <div><div id="chtop-t">KI-Assistent</div><div id="chtop-s">ChatGPT · Chirurgie</div></div>
    <button id="chcl" onclick="toggleChat()">✕</button>
  </div>
  <div id="chmsg">
    <div class="cm s">Medizinischer Assistent — Plastische &amp; Unfallchirurgie.<br>OpenAI-Key eingeben und los.</div>
  </div>
  <div id="chfot">
    <div id="chkey-row">
      <input id="chkey" type="password" placeholder="sk-… API-Key (lokal, nicht übertragen)">
      <button class="kok" onclick="saveKey()">✓ OK</button>
    </div>
    <div id="chin-row">
      <textarea id="chin" rows="2" placeholder="Frage… (Enter = senden)"></textarea>
      <button id="chsend" onclick="sendChat()">↑</button>
    </div>
  </div>
</div>

</div>

{id:'cu-brief',dep:'cu',grp:'CU · Arztbrief',lbl:'Arztbrief Bausteine CU',snips:[
  {lr:false,lbl:'Einleitung stationär',txt:`Die Patientin / der Patient stellte sich notfallmäßig am ___ in unserer Notaufnahme vor. In der initialen Diagnostik zeigte sich ___. Bei ___ nahmen wir Herrn/Frau ___ zur suffizienten Schmerztherapie und weiteren Abklärung stationär auf.`},
  {lr:false,lbl:'Operativer Verlauf komplikationslos',txt:`Nach unauffälliger präoperativer Vorbereitung führten wir den o.g. Eingriff am ___ durch. Der intra- und postoperative Verlauf gestaltete sich komplikationslos. Die Wundheilung verlief per primam und war trocken zum Entlassungszeitpunkt. Die postoperative röntgenologische Kontrolle zeigte eine regelrechte Reposition der Frakturfragmente bei korrekter Lage des Osteosynthesematerials. Die Drainage konnte zeitgerecht entfernt werden.`},
  {lr:false,lbl:'Mobilisation + Physiotherapie',txt:`Unter Anleitung der Krankengymnasten erfolgte die Mobilisation. Der Patient erhielt postoperativ Physiotherapie und wurde unter Entlastung mittels Unterarmgehstützen/Rollator auf Stationsebene mobilisiert. Schmerztherapie p.o./i.v. sowie Thromboembolieprophylaxe.`},
  {lr:false,lbl:'Entlassung ambulant',txt:`Wir entließen Herrn/Frau ___ bei subjektivem Wohlbefinden und reizlosen Wundverhältnissen am ___ in die weitere ambulante Behandlung. Bei Besonderheiten bitten wir um Wiedervorstellung in unserer Klinik. Medikamentenliste mitgegeben.`},
]},

{id:'cp-einl',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Einleitung / Verlauf',snips:[
  {lr:false,lbl:'Einleitung ambulant CP',txt:`... sich am ___ in unserer ambulanten operativen Therapie befand.

Nach den üblichen präoperativen Vorbereitungen und Aufklärung des Patienten / der Patientin über Risiken und Ausmaß der Behandlung, führten wir heute in komplikationsloser Larynxmaskenanästhesie / Fingerleitungsanästhesie / Lokalanästhesie o.g. Eingriff durch. Durchblutung, Motorik und Sensibilität wurden postoperativ kontrolliert und waren regelrecht. Wir konnten den Patienten / die Patientin am gleichen Tag bei stabilen Wundverhältnissen in die ambulante Behandlung entlassen.`},
  {lr:false,lbl:'Einleitung stationär CP + AB',txt:`Nach den üblichen präoperativen Vorbereitungen und Aufklärung des Patienten / der Patientin über Risiken und Ausmaß der Behandlung, führten wir am ___ in komplikationsloser Larynxmaskenanästhesie o.g. Eingriff durch. Es erfolgte perioperative Antibiotikatherapie mit ___ 1-0-1 i.v. Durchblutung, Motorik und Sensibilität wurden regelmäßig kontrolliert und waren zu jedem Zeitpunkt regelrecht. Die Drainagen konnten zeitgerecht entfernt werden. Wir konnten den Patienten / die Patientin am ___ bei stabilen Wundverhältnissen in die ambulante Behandlung entlassen.`},
  {lr:false,lbl:'WV-Termin + Adresse Sana Hof',txt:`Ihr freundliches Einverständnis voraussetzend, haben wir mit dem Patienten / der Patientin einen Wiedervorstellungstermin am ___ um ___ Uhr vereinbart. Sana Klinikum Hof, Sprechstunde Chirurgie, Ebene -1, gegenüber Interventionszentrum, IVZ. Terminvereinbarung Tel: 09281/982530.

Für Rückfragen stehen wir Ihnen jederzeit zur Verfügung.`},
  {lr:false,lbl:'Narbenpflege Standard',txt:`Nach kompletter Abheilung der Wunde wird die Applikation (intensives Einmassieren) von rückfettenden Cremes (z.B. Bepanthen Wund- und Heilsalbe) 3× täglich für 2 Monate dringend empfohlen. Meidung der Sonnenexposition für mind. 6 Monate. Für Rückfragen stehen wir Ihnen jederzeit zur Verfügung.`},
]},

{id:'cp-sehnen',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Sehnen / Nerven',snips:[

  {lr:true,lbl:'Sulcus ulnaris – N. ulnaris Dekompression',txt:`Diagnose: Sulcus-ulnaris-Syndrom re/li. Direkt postop.: deutliche Besserung. AB: Cefuroxim 1,5g i.v.

{id:'cp-hand-gelenk',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Hand / Gelenk',snips:[

  {lr:true,lbl:'Ulnaverkürzungsosteotomie',txt:`OP: Ulnaverkürzungsosteotomie re/li. AB: Ampicillin/Sulbactam 2/1g i.v. CAVE: Drehende Bewegungen strikt vermeiden!

{id:'cp-lap',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Lappenplastik / Wunde',snips:[
  {lr:false,lbl:'Gestielte Lappenplastik – Nachsorge',txt:`Proc:
• Pflegedienst tägl. VW:
  – Octenisept tupfend
  – Fetthaltige Gaze (Physiotulle)
  – Kompresse (keine Saugkompressen)
  – Kompressive Wicklung Idealbinde bis Knie
• Lappenplastik/Spalthaut NICHT schwitzen/mazarieren!
  → Morgens Verbände ab, Fuß abduschen, 30 min trocknen, dünn eincremen → Verband
• Bein nur mit Kompressionswicklung tief lagern
• Kompressionskleidung 6 Monate konsequent
• Narbenpflege: Bepanthen 3× tägl. 2 Monate. Meidung Sonne 6 Monate
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
  {lr:false,lbl:'Freier mikrochir. Lappen – Lappenkontrollen',txt:`Lappenkontrollen:
• Dopplersignal stündlich. Rekapillarisierung: 1. 3 Tage stündlich → 2h → 1×/Schicht
• Lappen blau → Dr. Polykandriotis: 01728121378
• DMS betroffene Extremität (Kompartment-Risiko)
Heparin 17.000 IE/24h → PTT 60 für 3 Tage → Tag 4: Clexane 40 1-0-1, Heparin ab.
Hb >9,0. Strickte Hochlagerung 7 Tage. Dann Lappentraining (RS Dr. Polykandriotis).
Kein Belastungsaufbau 4 Wochen. Kompressionsstrumpf 6 Monate. Meidung Sonne 6 Monate.`},
  {lr:false,lbl:'Spalthaut / Mesh Graft Nachsorge',txt:`Proc (Pflegedienst tägl.):
• Morgens: alle Verbände ab → Transplantat 1h an Luft abtrocknen lassen
• Dann: Octenisept → Lomatüll → Kompresse → Kompressionswicklung bis Knie
• Entnahmestelle OS: 2-tägige VW. Folie bis 14. Tag – Wechsel nur bei trüber Sekretion
• Ab 14. Tag: kein Verband mehr, tägl. fetthaltige Creme
• CAVE: KEINE OKKLUSIVEN VERBÄNDE! Mazeration vermeiden!
• Kompressionsstrumpf 6 Monate. Narbenpflege: Bepanthen 3× tägl. 3 Monate. Meidung Sonne.`},
  {lr:false,lbl:'Suprathel – Verbrennung',txt:`OP: Wundreinigung, Blasenabtragung, Suprathel®. Stationäre Überwachung indiziert.
Proc:
• Erster VW NUR durch uns in Sprechstunde am ___ Uhr!
• Verband löst sich → nur neu fixieren. CAVE: Matrix auf der Haut NICHT entfernen!
• Ab Woche 3: Kompressionshandschuh 6 Monate
• Narbenpflege: Bepanthen 3× tägl. 2 Monate. Meidung Sonne 6 Monate.`},
  {lr:false,lbl:'Kopftumor Basaliom – Lappenplastik',txt:`OP: Exzision → R0 histologisch → Rotationslappenplastik + Spalthaut OS + Überknüpfverband 5 Tage.
Proc:
• WV: Überknüpfverband entfernen wir. Keine Kopf-Tief-Haltung 7 Tage
• Fäden am Kopf ex 12. Tag. Folienverband OS 12 Tage (Wechsel nur bei Infektzeichen)
• Narbenpflege: Bepanthen 3× tägl. 2 Monate. Meidung Sonne konsequent
• Nachsorge: niedriges Rezidivrisiko → 6 Mo dann 1×jährlich. Hohes Risiko → alle 3 Monate`},
]},

{id:'cp-aesthetik',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Ästhetik',snips:[
  {lr:false,lbl:'Abdominoplastik + WARP',txt:`Diagnose: Dermatolipektomie Bauch. OP: Abdominoplastik + WARP. AB: Clindamycin 600mg i.v. Thromboseprophylaxe pneumatisch periop.
Proc:
• Abduschen ab Woche 2 – Pflaster nicht aufweichen!
• Husten/Bauchpresse 6 Wochen vermeiden
• Kompressionskleidung 6 Wochen Tag und Nacht
• Belastung >5kg ab Woche 8. Nahtm. resorbierbar – Fadenenden am 12. Tag kürzen
• Narbenpflege: Bepanthen 3× tägl. 2 Monate
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
  {lr:false,lbl:'Mammaimplantat – Augmentation',txt:`Diagnose: Involutionsatrophie Mamma bds. OP: Subpektorale Augmentation bds. Dual Plane n. Tebbets. AB: Ampicillin/Sulbactam 2/1g i.v. Implantatpass ausgehändigt.
Proc:
• Kompressionskleidung 6 Wochen Tag und Nacht
• Kein schweres Heben >5kg 6 Wochen. Armbelastung ab Woche 7
• Abduschen möglich – Pflaster nicht aufweichen
• Nahtm. resorbierbar – Fadenenden am 14. Tag kürzen
• WV nach 3 und 6 Wochen, 3 und 6 Monaten.`},
  {lr:false,lbl:'Gynäkomastie – PAL + Mastektomie',txt:`OP: PAL + subkutane Mastektomie + periareoläre Straffung bds. AB: Ampicillin/Sulbactam 2/1g i.v.
Proc:
• Kompressionskleidung 6 Wochen Tag und Nacht
• Kein schweres Heben >5kg 6 Wochen. Armbelastung ab Woche 7
• Abduschen ab Woche 2 – Pflaster nicht aufweichen
• Nahtm. resorbierbar – am 12. Tag kürzen
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
  {lr:false,lbl:'Blepharoplastik / Entropium',txt:`OP: Blepharoplastik / Entropiumkorrektur bds. AB lokal: Gentamycin Augentropfen.
Proc:
• Kühl-Packs 3 Tage konsequent. Uhrglas-Schutz 1 Woche nachts bds.
• Gentamycin AT 5× tägl. je 3 Tropfen 1 weitere Woche. Fäden ex 14. Tag.`},
  {lr:false,lbl:'Narbenkorrektur Gesicht',txt:`Proc nach Narbenkorrektur Gesicht:
• Kühlung 48h Tag und Nacht (mind. 3 Kühlpacks). Kopftieflagerung 48h VERBOTEN
• Kein Gewicht heben. Schlafen OKH-gelagert 1 Nacht
• Duschen erst ab Tag 5. Fäden durch uns entfernen
• Nach Fadenzug: 3× tägl. rückfettende Creme massieren 1 Monat
• Dann 2 Monate: 1× tägl. Silikongel mit LSF (BabScar Care, Asclepios)
• Endgültiges Ergebnis nach 6 Monaten`},
  {lr:false,lbl:'CRPS – Akutschmerztherapie',txt:`Diagnose: CRPS Typ I/II (M. Sudeck) re/li. Stationäre Akutschmerztherapie.
Maßnahmen: Stellatumblockaden ___×. Plexuskatheter. DMSO-Salbe mehrmals tägl. Prednisolon 100mg 1-0-0 1 Woche, dann ausschleichen 20mg/Woche. Gabapentin 100mg 1-1-1 bis max. 1800mg/d. Amineurin 10mg 0-0-1. CO2-Bäder, Lymphdrainage, Spiegeltherapie, Ergotherapie, TENS.
Proc: Gabapentin ambulant fortführen. Neurophysio N. ulnaris in 3 Monaten.`},
]},

{id:'op-bericht',dep:'cp',grp:'CP · OP-Berichte',lbl:'OP-Bericht Bausteine CP',snips:[
  {lr:false,lbl:'Standard-Einleitung OP-Bericht',txt:`Die druckstellenfreie Patientenlagerung wird vom Operateur kontrolliert. Einsicht in die schriftliche Patientenaufklärung. Verifizierung der Seite. Steriles Abwaschen und Abdecken nach Richtlinien des Hauses. Team Time Out. Single-Shot-Antibiotikaprophylaxe. Anlage pneumatischer Oberarmblutsperre 320 mmHg.`},
  {lr:false,lbl:'Beckenkamm – Spongiosaentnahme',txt:`Inzision mit 10er Messer am Becken, 2cm dorsal SIAS. Präparation bis Knochen mit Elektromesser. Beckenkamm dargestellt. Deckelförmig nach cranial gestielter Kortikalisdeckel mit oszillierender Säge. Entnahme ~3–4 qcm Spongiosa mit scharfem Löffel. Einlage Sulmycin-Schwamm 10×10cm + 12er Drainage. Schichtweiser Verschluss: 0er Vicryl CT1 Fasziennaht, Monocryl 2-0 subcutan, Hautnaht.`},
  {lr:false,lbl:'CTS – OP-Bericht n. McKinnon',txt:`~3–4cm longitudinale Inzision parallel Linea vitalis (n. McKinnon). Subcutis bipolar koaguliert. Adson-Spreizer. Scharfe Spaltung Palmaraponeurose und Retinaculum flexorum mit 15er Skalpell. N. medianus dargestellt – gefäßinjiziert (Kompressions­zeichen). Spaltung nach proximal bis Unterarmfaszie. Nerv völlig frei von Engpassstellen. Ramus muscularis geschont. Drainage. Wundverschluss 4-0 Ethilon. Verband. Schiene.`},
  {lr:false,lbl:'Dupuytren – Fasziektomie Y-V n. Dellon',txt:`Markierung Dupuytren-Stränge mit Methylenblau + Y-V-Muster n. Dellon. Inzision und Lappenbildung. Palmaraponeurose von proximal nach distal abgelöst unter Schonung interdigitaler GNB D3-4 und D4-5. Spiralband stumpf präpariert. Beugesehnen und Ringbänder intakt abgelöst. Vollständige Strangentfernung. Blutsperre eröffnet. Y-V-Plastiken vervollständigt. Redondrainage. Wundverschluss 4-0/5-0 Ethilon. Gipsschiene.`},

  {lr:false,lbl:'Abdominoplastik + WARP – OP-Bericht',txt:`Rückenlage. Markierungen Methylenblau. Quere Inzision Unterbauchfalte 10er Skalpell. Adipocutaner Lappen auf vordere Rektusfaszie. Umbilicus mit Stiel verschont. Präparation bis Rippenbogen und Proc. xiphoideus. WARP mit 2er Vicryl. Patientin auf 40° aufgesetzt. Neoumbilicus bestimmt, invertiertes V inzidiert, Subcutangewebe Metzenbaum-Schere ausgedünnt. Umbilicus mit 2-0 PDS fixiert. Dermolipektomie. Ausspülung. Blutstillung. 2× 14er Redondrainagen. Schichtweiser Verschluss 2-0 Vicryl, 2-0/3-0/4-0 Monocryl. Kompressionsmieder.`},

Shaver 3,0mm: radikales Debridement. Elektrothermische Synovialektomie + Denervierung. Spülung. Wundverschluss 5-0 Ethilon. Lipotalon 10mg. Naropin 7,5mg. Gipsschiene.`},

// STATE
let col={}, query='', dep='all';
let oaik=localStorage.getItem('oaik')||'';
const ch=[];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(t,q){
  if(!q)return esc(t);
  return esc(t).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>'<mark>'+m+'</mark>');
}

// BUILD NAV
function buildNav(){
  const nav=document.getElementById('sb-nav');
  nav.innerHTML='';
  const grps={};
  D.forEach(s=>{if(!grps[s.grp])grps[s.grp]=[];grps[s.grp].push(s);});
  Object.keys(grps).forEach(g=>{
    const l=document.createElement('div');l.className='ng';l.textContent=g;nav.appendChild(l);
    grps[g].forEach(s=>{
      const b=document.createElement('button');
      b.className='ni '+(s.dep==='cp'?'cp':s.dep==='cu'?'cu':'');
      b.dataset.id=s.id;b.textContent=s.lbl;
      b.onclick=()=>{
        document.getElementById('s-'+s.id)?.scrollIntoView({behavior:'smooth',block:'start'});
        document.querySelectorAll('.ni').forEach(x=>x.classList.remove('on'));
        b.classList.add('on');
      };
      nav.appendChild(b);
    });
  });
}

function navFilter(v){
  const q=v.toLowerCase();
  document.querySelectorAll('.ni').forEach(b=>{b.style.display=!q||b.textContent.toLowerCase().includes(q)?'':'none';});
}

// DEP
function setDep(d){
  dep=d;
  document.getElementById('ta').className='dtab'+(d==='all'?' on-all':'');
  document.getElementById('tp').className='dtab'+(d==='cp'?' on-cp':'');
  document.getElementById('tu').className='dtab'+(d==='cu'?' on-cu':'');
  render();
}
function doSearch(v){query=v.trim();render();}

// COPY
function copyT(txt,btn){
  navigator.clipboard.writeText(txt).then(()=>{
    btn.classList.add('ok');btn.textContent='✓ Kopiert';
    setTimeout(()=>{btn.classList.remove('ok');btn.textContent='Kopieren';},1400);
  });
}
function lrCopy(txt,side,btn){
  const t=txt.replace(/re\/li/g,side).replace(/rechts\/links/gi,side==='re'?'rechts':'links');
  navigator.clipboard.writeText(t).then(()=>{const o=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=o,1200);});
}

// RENDER
function render(){
  const area=document.getElementById('content');
  area.innerHTML='';
  const q=query.toLowerCase();
  let vis=0;
  D.forEach(sec=>{
    if(dep!=='all'&&sec.dep!==dep)return;
    const real=sec.snips.filter(s=>s.txt);
    const match=!q||real.some(s=>s.txt.toLowerCase().includes(q)||s.lbl?.toLowerCase().includes(q))||sec.lbl.toLowerCase().includes(q);
    if(!match)return;
    vis++;
    const card=document.createElement('div');card.className='sec';card.id='s-'+sec.id;
    const open=col[sec.id]!==false;
    const hc=sec.dep==='cp'?'hcp':sec.dep==='cu'?'hcu':'hge';
    const bc=sec.dep==='cp'?'bcp':sec.dep==='cu'?'bcu':'bge';
    const bt=sec.dep==='cp'?'Plastische':sec.dep==='cu'?'Unfall':'Allgemein';
    const hdr=document.createElement('div');hdr.className='shdr '+hc;
    hdr.innerHTML='<span class="stitle"><span class="'+bc+'">'+bt+'</span>'+esc(sec.lbl)+'</span><span class="ch'+(open?' op':'')+'">▼</span>';
    hdr.onclick=()=>{col[sec.id]=col[sec.id]===false;render();};
    card.appendChild(hdr);
    if(open){
      const mlS=sec.snips.find(s=>s.ml);
      if(mlS&&ML[mlS.ml]){
        const mb=document.createElement('div');mb.className='mbox';
        mb.innerHTML='<div class="mt">⚖ Medicolegal</div>'+esc(ML[mlS.ml]);
        card.appendChild(mb);
      }
      const list=document.createElement('div');list.className='slist';
      real.forEach(sn=>{
        const m2=!q||sn.txt.toLowerCase().includes(q)||sn.lbl?.toLowerCase().includes(q)||sec.lbl.toLowerCase().includes(q);
        if(!m2)return;
        const wrap=document.createElement('div');wrap.className='sn';
        const body=document.createElement('div');body.className='snbody';
        if(sn.lbl){const l=document.createElement('div');l.className='snlbl';l.textContent=sn.lbl;body.appendChild(l);}
        const pre=document.createElement('div');pre.className='sntxt';pre.innerHTML=hl(sn.txt,query);
        body.appendChild(pre);wrap.appendChild(body);
        const acts=document.createElement('div');acts.className='snacts';
        if(sn.lr){
          const row=document.createElement('div');row.className='lrrow';
          [{s:'re',c:'lre'},{s:'li',c:'lrl'},{s:'bds.',c:'lrb2'}].forEach(({s,c})=>{
            const b=document.createElement('button');b.className='lrb '+c;b.textContent=s.toUpperCase();
            b.onclick=e=>{e.stopPropagation();lrCopy(sn.txt,s,b);};
            row.appendChild(b);
          });
          acts.appendChild(row);
        }
        const cb=document.createElement('button');cb.className='cob';cb.textContent='Kopieren';
        cb.onclick=e=>{e.stopPropagation();copyT(sn.txt,cb);};
        acts.appendChild(cb);wrap.appendChild(acts);
        wrap.onclick=()=>copyT(sn.txt,cb);
        list.appendChild(wrap);
      });
      card.appendChild(list);
    }
    area.appendChild(card);
  });
  document.getElementById('cnt').textContent=q?vis+' Treffer':D.filter(s=>dep==='all'||s.dep===dep).length+' Kategorien';
}

// CHAT
let chatV=false;
function toggleChat(){
  chatV=!chatV;
  document.getElementById('chat').classList.toggle('hid',!chatV);
}
function saveKey(){
  oaik=document.getElementById('chkey').value.trim();
  localStorage.setItem('oaik',oaik);
  addMsg('API-Key gespeichert. Jetzt Fragen stellen.','s');
}
async function sendChat(){
  const inp=document.getElementById('chin');
  const txt=inp.value.trim();
  if(!txt)return;
  if(!oaik){addMsg('Bitte zuerst OpenAI API-Key eingeben und auf ✓ OK klicken.','s');return;}
  inp.value='';
  addMsg(txt,'u');ch.push({role:'user',content:txt});
  const th=addMsg('…','a');
  try{
    const r=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+oaik},
      body:JSON.stringify({
        model:'gpt-4o',max_tokens:900,
        messages:[{role:'system',content:'Du bist ein erfahrener Facharzt in Plastischer, Rekonstruktiver und Ästhetischer Chirurgie und Unfallchirurgie. Du hilfst Dr. Luis Perez (Assistenzarzt CP, Sana Klinikum Hof, unter Prof. Polykandriotis FAU Erlangen-Nürnberg) bei klinischen Fragen, Arztbriefen, OP-Berichten und Literatur. Antworte präzise auf Deutsch. Kein Präambel. Bei Literaturanfragen: konkrete Leitlinien (AWMF, DGU, DGPRÄC, IFSSH).'},...ch]
      })
    });
    const d=await r.json();
    const rep=d.choices?.[0]?.message?.content||d.error?.message||'Fehler.';
    th.textContent=rep;ch.push({role:'assistant',content:rep});
  }catch(e){th.textContent='Verbindungsfehler: '+e.message;}
}
function addMsg(txt,role){
  const box=document.getElementById('chmsg');
  const m=document.createElement('div');m.className='cm '+role;m.textContent=txt;
  box.appendChild(m);box.scrollTop=box.scrollHeight;return m;
}
document.getElementById('chin').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
});
if(oaik)document.getElementById('chkey').value='sk-…(gespeichert)';

buildNav();render();
</script>
</body>
