#wrap{display:flex;height:100vh}

#rcnt{font-size:11px;color:#aaa;white-space:nowrap}

#content{flex:1;overflow-y:auto;padding:18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;align-content:start}

.tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.tcp{background:#deeaf8;color:#1a3a5a}

{g:'CP · Lappenplastik / Wunde', dep:'cp', lbl:'Gestielte Lappenplastik – Nachsorge', lr:false,
txt:`Proc – Pflegedienst tägl. VW:

Kompressionskleidung: 6 Monate konsequent Tag und Nacht.
Narbenpflege: Bepanthen 3× tägl. 2 Monate. Meidung Sonne 6 Monate.
WV nach 3+6 Wochen, 3+6 Monaten. Tel: 09281/982530`},

{g:'CP · Lappenplastik / Wunde', dep:'cp', lbl:'Freier Lappen – Lappenkontrollen', lr:false,
txt:`Lappenkontrollen:

Hb >9,0 halten. Strickte Hochlagerung 7 Tage. Dann Lappentraining (RS Dr. Polykandriotis).
Kein Belastungsaufbau 4 Wochen. Kompressionsstrumpf 6 Monate. Meidung Sonne 6 Monate.
WV nach 3+6 Wochen, 3+6 Monaten. Tel: 09281/982530`},

{g:'CP · Lappenplastik / Wunde', dep:'cp', lbl:'Spalthaut – Nachsorge', lr:false,
txt:`Proc – Pflegedienst tägl.:

{g:'CP · Lappenplastik / Wunde', dep:'cp', lbl:'Suprathel – Verbrennung', lr:false,

// ══ CP OP-BERICHTE ═══════════════════════════
{g:'CP · OP-Berichte', dep:'cp', lbl:'Standard-Einleitung', lr:false,
txt:`Die druckstellenfreie Patientenlagerung wird vom Operateur kontrolliert. Einsicht in die schriftliche Patientenaufklärung. Verifizierung der Seite. Steriles Abwaschen und Abdecken nach Richtlinien des Hauses. Team Time Out. Single-Shot-Antibiotikaprophylaxe. Anlage pneumatischer Oberarmblutsperre 320 mmHg.`},

{g:'CP · OP-Berichte', dep:'cp', lbl:'Beckenkamm – Spongiosaentnahme', lr:false,
txt:`Inzision 10er Messer, 2cm dorsal SIAS. Präparation bis Knochen. Beckenkamm dargestellt. Deckelförmig nach cranial gestielter Kortikalisdeckel mit oszillierender Säge. Entnahme ~3–4qcm Spongiosa. Sulmycin-Schwamm + 12er Drainage. Schichtweiser Verschluss: 0er Vicryl CT1 Fasziennaht, Monocryl 2-0 subcutan, Hautnaht.`},

{g:'CP · OP-Berichte', dep:'cp', lbl:'CTS – n. McKinnon', lr:false,
txt:`~3–4cm longitudinale Inzision parallel Linea vitalis (n. McKinnon). Subcutis bipolar koaguliert. Adson-Spreizer. Scharfe Spaltung Palmaraponeurose + Retinaculum flexorum mit 15er Skalpell. N. medianus dargestellt – gefäßinjiziert (Kompressionszeichen). Spaltung bis Unterarmfaszie. Nerv frei. Ramus muscularis geschont. Drainage. Wundverschluss 4-0 Ethilon. Verband. Schiene.`},

{g:'CP · OP-Berichte', dep:'cp', lbl:'Dupuytren – Y-V n. Dellon', lr:false,
txt:`Markierung Stränge + Y-V-Muster n. Dellon (Methylenblau). Inzision und Lappenbildung. Palmaraponeurose von proximal nach distal abgelöst unter Schonung GNB D3-4 + D4-5. Spiralband stumpf. Beugesehnen + Ringbänder intakt. Vollständige Strangentfernung. Blutsperre eröffnet. Y-V-Plastiken vervollständigt. Redondrainage. Wundverschluss 4-0/5-0 Ethilon. Gipsschiene.`},

{g:'CP · OP-Berichte', dep:'cp', lbl:'Flexorensehne – n. Adelaide / Zechner', lr:false,
txt:`Narbe ausgeschnitten. Schnitt prox.+dist. erweitert. GNB dargestellt. FDP D___ durchtrennt, Stumpf in Hohlhand. Mosquito → hervorgeholt. Kernnaht n. Adelaide / n. Zechner mit 3-0 Prolene. Überwendlungsnaht 5-0 PDS. Spülung. Drainage. Wundverschluss 4-0 Ethilon. Gipsschiene.`},

{g:'CP · OP-Berichte', dep:'cp', lbl:'Abdominoplastik + WARP', lr:false,
txt:`Rückenlage. Markierungen Methylenblau. Quere Inzision Unterbauchfalte 10er Skalpell. Adipocutaner Lappen auf vordere Rektusfaszie. Umbilicus verschont. Präparation bis Rippenbogen + Proc. xiphoideus. WARP mit 2er Vicryl. Patientin 40° aufgesetzt. Neoumbilicus-Inzision (invertiertes V). Dermolipektomie. Ausspülung. Blutstillung. 2× 14er Redondrainagen. Schichtweiser Verschluss: 2-0 Vicryl, 2-0/3-0/4-0 Monocryl. Kompressionsmieder.`},

{g:'CP · OP-Berichte', dep:'cp', lbl:'Mammaimplantat – Dual Plane', lr:false,
txt:`Inzisionen bilateral ~4–5cm lateral der Mittellinie. Präparation auf Pectoralis-Faszie. Dual Plane n. Tebbets: M. pectoralis auf Höhe Areola durchtrennt. Submuskuläre Tasche bds. Sizer: re ___cc, li ___cc. Taschenspülung Octenisept, Handschuhwechsel. Keller-Funnel-Einbringung. Patientin aufgesetzt. Submammarfalte 2-0 Monocryl mehrschichtig rekonstruiert. Drainagen. Verband.`},

{g:'CP · OP-Berichte', dep:'cp', lbl:'Arthroskopie HG – Befund + Shaver', lr:false,
txt:`Extensionsvorrichtung, Traktion 6kg, Blutleere 320mmHg. Portale 3-4 und 6R. Befund:
– Fossa scaphoidea/lunata: intakt
– Radialer Recessus: Synovialitis, Gefäßinjektion
– SL-Band + Watson: kein Anhalt Dissoziation
– TFCC / Recessus ulnaris: Synovialitis, pos. Trampolineffekt, degenerative Discusläsion
Shaver 3,0mm: radikales Debridement. Elektrothermische Synovialektomie + Denervierung.
Spülung. Wundverschluss 5-0 Ethilon. Lipotalon 10mg. Naropin 7,5mg. Gipsschiene.`},

];

// ─── STATE ────────────────────────────────────────────────────────────────────
let dep='all', query='';
const kiHist=[];
let kiOpen=false;

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(t,q){
  if(!q)return esc(t);
  return esc(t).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>'<mark>'+m+'</mark>');
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('done');btn.textContent='✓ Kopiert';
    setTimeout(()=>{btn.classList.remove('done');btn.textContent='Kopieren';},1500);
  });
}
function lrCopy(text,side,btn){
  const t=text.replace(/re\/li/g,side).replace(/rechts\/links/gi,side==='re'?'rechts':'links');
  navigator.clipboard.writeText(t).then(()=>{
    const o=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=o,1200);
  });
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function buildNav(){
  const nav=document.getElementById('snav');nav.innerHTML='';
  const gs={};
  D.forEach(item=>{if(!gs[item.g])gs[item.g]=[];gs[item.g].push(item);});
  Object.keys(gs).forEach(g=>{
    const gl=document.createElement('div');gl.className='sg';gl.textContent=g;nav.appendChild(gl);
    gs[g].forEach(item=>{
      const b=document.createElement('button');
      b.className='si '+(item.dep==='cp'?'cp':item.dep==='cu'?'cu':'');
      b.textContent=item.lbl;
      b.onclick=()=>{
        // scroll to card by finding matching element
        const cards=document.querySelectorAll('.card,.mlcard');
        cards.forEach(c=>{if(c.dataset.lbl===item.lbl) c.scrollIntoView({behavior:'smooth',block:'center'});});
        document.querySelectorAll('.si').forEach(x=>x.classList.remove('on'));
        b.classList.add('on');
      };
      nav.appendChild(b);
    });
  });
}

function navFilter(v){
  const q=v.toLowerCase();
  document.querySelectorAll('.si').forEach(b=>{b.style.display=!q||b.textContent.toLowerCase().includes(q)?'':'none';});
}

// ─── DEP / SEARCH ────────────────────────────────────────────────────────────
function setDep(d){
  dep=d;
  document.getElementById('ba').className='dtab'+(d==='all'?' all':'');
  document.getElementById('bp').className='dtab'+(d==='cp'?' cp':'');
  document.getElementById('bu').className='dtab'+(d==='cu'?' cu':'');
  render();
}
function doSearch(v){query=v.trim();render();}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const area=document.getElementById('content');
  area.innerHTML='';
  const q=query.toLowerCase();
  let vis=0, lastG='';

  const filtered=D.filter(item=>{
    if(dep!=='all'&&item.dep!==dep)return false;
    if(!q)return true;
    return item.txt.toLowerCase().includes(q)||item.lbl.toLowerCase().includes(q);
  });

  if(filtered.length===0){
    const e=document.createElement('div');e.className='empty';e.textContent='Keine Bausteine gefunden.';area.appendChild(e);
    document.getElementById('rcnt').textContent='0 Treffer';return;
  }

  filtered.forEach(item=>{
    // Group header
    if(item.g!==lastG){
      const gh=document.createElement('div');gh.className='sec-title';gh.textContent=item.g;area.appendChild(gh);
      lastG=item.g;
    }
    vis++;

    // ML card
    if(item.ml){
      const mc=document.createElement('div');mc.className='mlcard';mc.dataset.lbl=item.lbl;
      const tagTxt=item.dep==='cp'?'Plastische':item.dep==='cu'?'Unfall':'Info';
      mc.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="tag">${tagTxt}</span><span style="font-size:11px;font-weight:600;color:#7a6000;letter-spacing:.05em;text-transform:uppercase">${esc(item.lbl)}</span></div><div class="mltxt">${hl(item.txt,query)}</div>`;
      area.appendChild(mc);return;
    }

    const card=document.createElement('div');card.className='card';card.dataset.lbl=item.lbl;

    // Head
    const head=document.createElement('div');head.className='card-head';
    const tagClass=item.dep==='cp'?'tcp':item.dep==='cu'?'tcu':'';
    const tagTxt=item.dep==='cp'?'Plastische':item.dep==='cu'?'Unfall':'';
    head.innerHTML=`<span class="tag ${tagClass}">${tagTxt}</span><span class="clbl">${esc(item.lbl)}</span>`;
    card.appendChild(head);

    // Text
    const txt=document.createElement('div');txt.className='ctxt';txt.innerHTML=hl(item.txt,query);
    card.appendChild(txt);

    // Footer
    const foot=document.createElement('div');foot.className='card-foot';
    if(item.lr){
      const row=document.createElement('div');row.className='lr-btns'||'';row.style.cssText='display:flex;gap:5px;flex-wrap:wrap';
      [{s:'re',c:'lrbtn lre'},{s:'li',c:'lrbtn lrl'},{s:'bds.',c:'lrbtn lrb'}].forEach(({s,c})=>{
        const b=document.createElement('button');b.className=c;b.textContent=s.toUpperCase();
        b.onclick=()=>lrCopy(item.txt,s,b);foot.appendChild(b);
      });
    }
    const cb=document.createElement('button');cb.className='cbtn';cb.textContent='Kopieren';
    cb.onclick=()=>copyText(item.txt,cb);
    foot.appendChild(cb);
    // click card also copies
    txt.onclick=()=>copyText(item.txt,cb);
    card.appendChild(foot);
    area.appendChild(card);
  });

  document.getElementById('rcnt').textContent=q?`${vis} Treffer`:`${vis} Bausteine`;
}

// ─── KI (Claude) ──────────────────────────────────────────────────────────────
function toggleKI(){
  kiOpen=!kiOpen;
  document.getElementById('ki').classList.toggle('off',!kiOpen);
}

function addKIMsg(txt,role){
  const box=document.getElementById('kimsgs');
  const m=document.createElement('div');m.className='km k'+role;m.textContent=txt;
  box.appendChild(m);box.scrollTop=box.scrollHeight;return m;
}

async function sendKI(){
  const inp=document.getElementById('kiinp');
  const text=inp.value.trim();if(!text)return;
  inp.value='';
  addKIMsg(text,'u');
  kiHist.push({role:'user',content:text});
  const wait=addKIMsg('…','a');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'Du bist ein erfahrener Facharzt in Plastischer, Rekonstruktiver und Ästhetischer Chirurgie und Unfallchirurgie. Du hilfst Dr. Luis Perez (Assistenzarzt CP, Sana Klinikum Hof, unter Prof. Polykandriotis FAU Erlangen-Nürnberg) bei klinischen Fragen, Arztbriefen, OP-Berichten und medizinischer Literatur. Antworte präzise auf Deutsch. Kein langes Präambel.',
        messages:kiHist
      })
    });
    const d=await r.json();
    const rep=d.content?.[0]?.text||d.error?.message||'Keine Antwort.';
    wait.textContent=rep;
    kiHist.push({role:'assistant',content:rep});
  }catch(e){wait.textContent='Verbindungsfehler: '+e.message;}
}

document.getElementById('kiinp').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendKI();}
});

// ─── INIT ────────────────────────────────────────────────────────────────────
buildNav();
render();
</script>
</body>
</html>
