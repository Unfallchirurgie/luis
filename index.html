{id:'cp-einl',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Einleitung / Verlauf',snips:[
 {lr:false,lbl:'Einleitung ambulant CP',txt:`... sich am ___ in unserer ambulanten operativen Therapie befand.
 
Nach den üblichen präoperativen Vorbereitungen und Aufklärung des Patienten / der Patientin über Risiken und Ausmaß der Behandlung, führten wir heute in komplikationsloser Larynxmaskenanästhesie / Fingerleitungsanästhesie / Lokalanästhesie o.g. Eingriff durch. Durchblutung, Motorik und Sensibilität wurden postoperativ kontrolliert und waren regelrecht. Wir konnten den Patienten / die Patientin am gleichen Tag bei stabilen Wundverhältnissen in die ambulante Behandlung entlassen.`},
 {lr:false,lbl:'Einleitung stationär CP + AB',txt:`Nach den üblichen präoperativen Vorbereitungen und Aufklärung des Patienten / der Patientin über Risiken und Ausmaß der Behandlung, führten wir am ___ in komplikationsloser Larynxmaskenanästhesie o.g. Eingriff durch. Es erfolgte perioperative Antibiotikatherapie mit ___ 1-0-1 i.v. Durchblutung, Motorik und Sensibilität wurden regelmäßig kontrolliert und waren zu jedem Zeitpunkt regelrecht. Die Drainagen konnten zeitgerecht entfernt werden. Wir konnten den Patienten / die Patientin am ___ bei stabilen Wundverhältnissen in die ambulante Behandlung entlassen.`},
 {lr:false,lbl:'WV-Termin + Adresse',txt:`Ihr freundliches Einverständnis voraussetzend, haben wir mit dem Patienten / der Patientin einen Wiedervorstellungstermin am ___ um ___ Uhr vereinbart. Sana Klinikum Hof, Sprechstunde Chirurgie, Ebene -1, gegenüber Interventionszentrum, IVZ. Terminvereinbarung Tel: 09281/982530 Belegungsmanagement.
 
Für Rückfragen stehen wir Ihnen jederzeit zur Verfügung.`},
 {lr:false,lbl:'Narbenpflege Standard',txt:`Nach kompletter Abheilung der Wunde wird die Applikation (intensives Einmassieren) von rückfettenden Cremes (z.B. Bepanthen Wund- und Heilsalbe) 3× täglich für 2 Monate dringend empfohlen. Meidung der Sonnenexposition für mind. 6 Monate. Silikongelbehandlung ab der 6. Woche empfohlen. Für Rückfragen stehen wir Ihnen jederzeit zur Verfügung.`},
]},
 
{id:'cp-hand-sehnen',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Sehnen / Nerven Hand',snips:[
 {lr:true,lbl:'Flexorensehnennaht – Kleinert',txt:`Diagnose: Durchtrennung FDP/FDS D___ Zone ___ re/li.
OP: Sehnennaht n. Adelaide/Zechner + adaptierende Überwendlungsnaht 5-0. Periop. AB: Ampicillin/Sulbactam 2/1g 1-1-1 i.v. Drainagen zeitgerecht entfernt.
Proc:
• Kleinert-Schiene bis Erhalt der angepassten Kleinert-Schiene
• Nachbehandlung nach Kleinert-Schema für 6 Wochen
• Aktive Beübung ohne Belastung für weitere 4 Wochen
• Belastungsaufbau ab 10.–12. Woche postop
• Fäden ex 14. Tag. Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'Flexor + Nervennaht – Kleinert',txt:`Diagnose: Durchtrennung FDP/FDS D___ + N. ___ Zone ___ re/li.
OP: Sehnennaht + epineurale Koaptation / Nervenconduit Reaxxon. Periop. AB: Ampicillin/Sulbactam 2/1g 1-1-1 i.v.
Proc:
• Kleinert-Schema für 6 Wochen (Beginn ab 10. Tag postOP)
• Aktive Beübung ohne Belastung weitere 4 Wochen. Belastungsaufbau ab 10. Woche
• Fäden ex 14. Tag. Narbenpflege: Bepanthen 3× tägl. 2 Monate.
• Sensomotorisch-perzeptive Ergotherapie nach Wundheilung
• Neurophysiologische Kontrolle in 2–3 Monaten`},
 {lr:true,lbl:'Extensorensehnennaht – Reverse Kleinert',txt:`Diagnose: Durchtrennung Extensor D___ Zone ___ re/li.
OP: Extensorennaht + Gipsschiene. Periop. AB: Ampicillin/Sulbactam 2/1g i.v.
Proc:
• Gipsschiene bis Erhalt der Reverse-Kleinert-Schiene
• Nachbehandlung nach reversed Kleinert-Schema für 6 Wochen
• Aktive Beübung ohne Belastung weitere 4 Wochen
• Belastungsaufbau ab 10. Woche. Fäden ex 14. Tag. Narbenpflege: Bepanthen 3× tägl.`},
 {lr:true,lbl:'FPL Ruptur – Ersatzplastik FDS D4',txt:`Diagnose: FPL Ruptur re/li. Motorische Ersatzplastik FDS D4 → FPL.
OP: Sehnenrekonstruktion, Pulvertaft-Durchflechtung, Spannung n. Tenodese-Manöver. Periop. AB: Ampicillin/Sulbactam 2/1g i.v.
Proc:
• Reverse-Kleinert-Schiene – Rezept bereits ausgestellt
• Kleinert-Schema für 5 Wochen. Aktive Beübung 4 Wochen. Belastungsaufbau ab 10. Woche
• Fäden ex 14. Tag. Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'CTS ambulant – N. medianus Dekompression',txt:`Diagnose: Karpaltunnelsyndrom re/li.
OP: Offene chirurgische Dekompression N. medianus, Neurolyse, n. McKinnon. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. DMS postop. regelrecht.
Proc:
• Fäden ex 14. Tag. Schiene: 2 Wochen
• Frühfunktionelle Beübung ohne Belastung: 3 Wochen. Dann Belastungsaufbau
• Narbenpflege: Bepanthen intensiv einmassieren 3× tägl. 2 Monate
• Neurophysiologische Kontrolle in 2 Monaten`},
 {lr:true,lbl:'CTS stationär (erhöhtes Nachblutungsrisiko)',txt:`Diagnose: Karpaltunnelsyndrom re/li. Stationäre Überwachung aufgrund erhöhten Nachblutungsrisikos indiziert.
OP: Offene chirurgische Dekompression N. medianus. DMS postop. regelrecht.
Proc:
• Fäden ex 14. Tag. Schiene: 2 Wochen
• Frühfunktionelle Beübung ohne Belastung: 3 Wochen. Dann Belastungsaufbau
• Narbenpflege: Bepanthen intensiv einmassieren 3× tägl. 2 Monate
• Neurophysiologische Kontrolle in 2 Monaten`},
 {lr:true,lbl:'Sulcus ulnaris – N. ulnaris Dekompression',txt:`Diagnose: Sulcus-ulnaris-Syndrom (SUS) re/li. Direkt postoperativ: deutliche Besserung der Symptomatik. Stationäre Überwachung indiziert (Nachblutungsrisiko). Periop. AB: Cefuroxim 1,5g i.v.
Proc:

• Schiene: 2 Wochen. Dann Beübung ohne Belastung 2 Wochen. Dann Belastungsaufbau

• Narbenpflege: Bepanthen 3× tägl. 2 Monate`},
]},
 
{id:'cp-hand-gelenk',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Hand / Gelenk / Osteosynthese',snips:[

Proc:
• Hochlagerung mind. 48 h
• Ab 2. Tag: 10×10 Übungen tägl. – Schiene selbstständig abnehmen/anlegen
• Schiene: 5 Wochen gesamt
• Belastungsaufbau ab 8. Woche postop
• Fäden ex 14. Tag. Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'MHK V – intramedullär',txt:`Diagnose: Subkapitale Metakarpale-V-Fraktur re/li. OP: Geschlossene Reposition und Osteosynthese mittels intramedullärem Draht.
Proc:
• WV-Termin vereinbart. Röntgenkontrolle: korrekte Materiallage.
• Fäden ex 14. Tag. Schiene: 5 Wochen
• Ab 5. Tag: 3× tägl. Schiene abnehmen und Finger/HG beüben
• Metallentfernung in Woche 6 ambulant extern. Röntgenbefunde auf CD mitgegeben
• Belastungsaufbau ab 8. Woche. Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'Ulnaverkürzungsosteotomie',txt:`OP: Ulnaverkürzungsosteotomie re/li. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Röntgen postop.: korrekte Materiallage.
CAVE: Drehende Bewegungen im Handgelenk strikt vermeiden!
Proc:
• Nahtmaterial resorbierbar. Schiene nicht nötig – Arm ohne Belastung bewegen
• Drehende Unterarmbewegungen strikt vermeiden
• Belastungsaufbau ab 10. Woche. Armbelastende Sportarten (z.B. MTB) mind. 12 Wochen nicht
• Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'Four Corner Fusion / mediocarpale Teilarthrodese',txt:`OP: Mediocarpale Teilarthrodese (Four Corner Fusion) + Spongiosaplastik Beckenkamm re/li. Periop. AB: Ampicillin/Sulbactam 2/1g i.v.
Proc:
• Hochlagerung 1 Woche. Fäden ex 14. Tag
• Schiene 2 Wochen. Dann zirkulärer Cast für 8 Wochen. Daumen und Langfinger frei
• CT-Kontrolle in der 10. Woche postop (MVZ 360° Radiologie, Tel: 09281/983347)
• ME erst nach radiologischer Konsolidierung! Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'Scaphoidfraktur – Herbertschraube',txt:`Diagnose: Scaphoidfraktur re/li. OP: In Larynxmaskenanästhesie. Periop. AB: Cefuroxim 1,5g i.v. Röntgen postop.: korrekte Materiallage.
Proc:
• Hochlagerung. Fäden ex 14. Tag. Schiene: 2 Wochen
• Dann zirkulärer Scaphoidgips weitere 3 Wochen
• Freigabe zur aktiv-passiven Beübung ohne Belastung bis 10. Woche
• Belastungsaufbau ab 10. Woche. Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'RSL-Fusion / Handgelenksdenervierung n. Wilhelm',txt:`OP: Teilarthrodese Handgelenk (RSL-Fusion) + Spongiosaplastik Becken + Denervierung n. Wilhelm re/li. Periop. AB: Cefuroxim 1,5g i.v.
Proc:
• Hochlagerung. Fäden ex 14. Tag. Schiene: 2 Wochen
• Dann zirkulärer Cast 8 Wochen. Daumen und Langfinger frei
• CT HG in Woche 10 (MVZ 360°, Tel: 09281/983347). Freigabe erst nach CT-Beurteilung durch uns
• Frühfunktionelle Beübung Langfinger ab sofort. Belastungsaufbau ab 12. Woche.`},
 {lr:true,lbl:'Replantation Phalangen / Daumen',txt:`OP: Replantation D___ re/li. K-Draht-Osteosynthese, FPL/EPL-Rekonstruktion, venöse Anastomose, neuronale Koaptation, Nervenconduit. Periop. AB: Ciprofloxacin 400mg 1-0-1 i.v. Med. Blutegel postop. EK-Transfusion: ___ Konserven.
Proc:
• Schiene bis ME nach Rö-Kontrolle in Woche 5
• Fäden ex 14. Tag. Siliconfingerling ab Woche 3
• Sensomotorisch-perzeptive Ergotherapie nach Abheilung
• Bei neuropathischen Schmerzen: Targin 10/5mg 1-0-1 + Lyrica 50mg 1-0-1 p.o.
• Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
 {lr:true,lbl:'Gelenkendoprothese Swanson PIP',txt:`OP: Gelenkendoprothese PIP-Gelenk D___ re/li (Swanson Flexspan). Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Röntgen postop.: korrekte Materiallage. Implantatpass ausgehändigt.
Proc:
• Gipsschiene bis Erhalt der Reverse-Kleinert-Schiene (Sanitätshaus Recknagel Hof)
• Kleinert-Schema 6 Wochen. Aktive Beübung ohne Belastung 4 Wochen
• Belastungsaufbau ab 10. Woche. Fäden ex 14. Tag. Narbenpflege: Bepanthen 3× tägl.`},
 {lr:true,lbl:'Rhizarthrose – Trapeziektomie + RSIA (Lundborg)',txt:`Diagnose: Rhizarthrose re/li (CMC I-Arthrose). OP: Resektions-Suspensions-Interpositions-Arthroplastik n. Lundborg. Periop. AB: Cefuroxim 1,5g i.v.
Proc:
• Nahtmaterial resorbierbar – Fadenenden am 14. Tag zurückkürzen
• Schiene 2 Wochen. Dann Rhizosplint-Orthese 2 Wochen 24h. Dann Orthese 2 Wochen nachts
• Dann Beübung aktiv-passiv unter KG ohne Belastung. Belastungsaufbau ab 9. Woche.`},
 {lr:true,lbl:'Neuronale Koaptation',txt:`Diagnose: Nervenverletzung N. ___ D___ Zone ___ re/li.
OP: Neuronale Koaptation in Larynxmaskenanästhesie. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Palmare Gipsschiene.
Proc:
• Gips: 2 Wochen (unkompliziert) / 4 Wochen (Spannungsverhältnisse)
• Fäden ex 14. Tag. Narbenpflege: Bepanthen 3× tägl. 2 Monate
• Sensomotorisch-perzeptive Ergotherapie nach Wundheilung. Neurophysio in 3 Monaten.`},
 {lr:true,lbl:'Amputation / Stumpfneurom',txt:`Diagnose: Amputation D___ / Stumpfneurom D___ re/li.
OP: Larynxmaskenanästhesie. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Drainagen zeitgerecht.
Proc:
• Fäden ex 14. Tag. Siliconfingerling ab Woche 3. Belastungsaufbau ab Woche 8
• Neuropathische Schmerzen: Targin 10/5mg 1-0-1 + Lyrica 50mg 1-0-1 p.o. (langsam steigern)
• Sensomotorisch-perzeptive Ergotherapie nach Abheilung. Narbenpflege: Bepanthen 3× tägl.`},
 {lr:true,lbl:'Lappenplastik Hand (Moberg / Cross-Finger)',txt:`OP: Cross-Finger-Lappenplastik / Moberg-Lappenplastik re/li. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Überknüpfverband entfernt am 5. postop. Tag.
Proc:
• Regelmäßige VW (mind. 1×/Woche) mit nichthaftenden Wundauflagen (Adaptic touch)
• Lappenstieldurchtrennung zwischen Tag 16–18. Bis dahin Unterarmschiene
• Nahtmaterial Unterarm resorbierbar – keine Fadenentfernung
• Nach Stieldurchtrennung: aktiv-passiv Beübung ohne Belastung 2 Wochen, dann Ergotherapie
• Silikonfingerling rezeptieren (z.B. Medigel). Belastungsaufbau ab Woche 6. Narbenpflege.`},
 {lr:true,lbl:'Phlegmone Hand – operative Sanierung',txt:`Diagnose: Hand-Phlegmone D___ / Beugesehnenscheiden-Empyem / Handphlegmone re/li.
OP: Inzision, Débridement, Spül-Ablaufdrainagen. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Tgl. desinfizierende Handbäder, strickte Hochlagerung. Schiene 3 Tage.
Proc:
• Fäden ex 14. Tag. Beübung ohne Belastung ab sofort für 2 Wochen
• Amoclav 875/125mg 1-0-1 p.o. für 5 Tage. Ibuprofen 600mg 1-1-1 + Pantoprazol 40mg.
• Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
]},
 
{id:'cp-lap-wunde',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Lappenplastik / Wunddeckung',snips:[
 {lr:false,lbl:'Gestielte Lappenplastik (Peroneus brevis) – Nachsorge',txt:`Bis zur endgültigen Lappendeckung VAC-Therapie-Konditionierung. OP: Lappenplastik in komplikationsloser LMA. Periop. AB: Tazobac 4,5g 1-0-1 i.v. Steinmannnagel + hängende Fixation postop. Im Verlauf distaler Pol nekrotisch → Revision + Nekrektomie + Mobilisation verbleibender Lappenanteil. Heilungsverlauf dann regelrecht.
Thrombose- und Pneumonieprophylaxe: NMH tägl., Antithrombosestrümpfe, Triflow-Training, Mobilisierung.
Proc:
• Pflegedienst tägl. VW wurde organisiert:
  – Tupfende Wunddesinfektion (Octenisept)
  – Fetthaltige Gaze (Physiotulle)
  – Kompresse (keine Saugkompressen)
  – Kompressive Wicklung mit Idealbinde bis Knie
• Bein darf nur mit kompressiver Wicklung tief gelagert werden
• Lappenplastik/Spalthaut NICHT schwitzen/mazarieren!
  → Morgens Verbände entfernen, Fuß abduschen, 30 min frei trocknen, dünn eincremen
  → Bei Schwitzen im AirCast Walker: Walker entfernen und Fuß trocknen
• Kompressionskleidung: 6 Monate konsequent Tag und Nacht
• Narbenpflege: Bepanthen 3× tägl. 2 Monate. Meidung Sonne mind. 6 Monate
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
 {lr:false,lbl:'Freie mikrochir. Lappenplastik – Lappenkontrollen',txt:`Lappenkontrollen:
• Dopplersignal stündlich. Rekapillarisierung: erste 3 Tage stündlich, dann 2 h, dann 1×/Schicht
• Wenn Lappen blau → Dr. Polykandriotis benachrichtigen: 01728121378
• DMS des betroffenen Fußes/Hand kontrollieren (Kompartment-Risiko)
Bear-Hugger für 3 Tage postop. Heparin 17.000 IE/24h → nach PTT (Ziel 60) steuern für 3 Tage. Ab Tag 4 überlappend Clexane 40 1-0-1, Heparin absetzen. Hb >9,0 halten. Strickte Hochlagerung 7 Tage. Dann Lappentraining (Rücksprache Dr. Polykandriotis). Kein Belastungsaufbau für 4 Wochen.
Kompressionsstrumpf nach Abheilung 6 Monate. Narbenpflege: Bepanthen. Meidung Sonne 6 Monate.
WV nach 3 und 6 Wochen und 3 und 6 Monaten. Tel: 09281/982530`},
 {lr:false,lbl:'Spalthaut / Mesh Graft – Nachsorge',txt:`OP: Spalthauttransplantation + ggf. buried chips skin graft. VAC auf Empfängerstelle für 5 Tage.
Proc (Pflegedienst tägl.):
• Morgens Pat. entfernt alle Verbände → Transplantat mind. 1 h an Luft abtrocknen
• Dann: tupfende Wunddesinfektion → fetthaltige Gaze (Lomatüll) → Kompresse → kompressive Wicklung bis Knie
• Entnahmestelle OS: 2-tägige VW. Folienverband bis 12. Tag – Wechsel nur bei trüber Sekretion
• Ab 14. Tag bei abgeschlossener Wundheilung: kein Verband mehr, tägl. mehrmals fetthaltige Creme
• CAVE: KEINE OKKLUSIVEN VERBÄNDE! KEINE SAUGKOMPRESSEN! Mazeration dringend vermeiden!
• Kompressionsstrumpf rezeptiert: 6 Monate konsequent nach Abheilung
• Narbenpflege: Bepanthen intensiv einmassieren 3× tägl. 3 Monate. Meidung Sonne 6 Monate.`},
 {lr:false,lbl:'VAC-Therapie / Konditionierung',txt:`Bis zur endgültigen Lappendeckung wurde die Wunde mittels VAC-Therapie konditioniert. Periop. AB testgerecht (Tazobac 4,5g 1-0-1 i.v.). Thrombose- und Pneumonieprophylaxe: NMH tägl., Antithrombosestrümpfe, Triflow-Training, Mobilisierung im Zimmer.`},
 {lr:false,lbl:'Kopftumor – Basaliom + Lappenplastik + Spalthaut',txt:`OP: Exzisionsbiopsie → nach R0-Bestätigung (histologisch im Gesunden): Rotationslappenplastik + Spalthaut Oberschenkel + Überknüpfverband 5 Tage.
Proc:
• WV-Termin → Überknüpfverband wird durch uns entfernt. Bis dahin Verband belassen
• Keine Kopf-Tief-Haltung für 7 Tage
• Fäden ex am Kopf 12. Tag. Folienverband OS für 12 Tage (Wechsel nur bei Infektzeichen)
• Narbenpflege: Bepanthen 3× tägl. 2 Monate. Meidung Sonne konsequent
• Nachsorge Basaliom: Niedriges Rezidivrisiko → 6 Monate, dann 1×jährl. Hohes Risiko / multipel → alle 3 Monate`},
]},
 
{id:'cp-aesthetik',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Ästhetik (Abdomen / Mamma / Körper)',snips:[
 {lr:false,lbl:'Abdominoplastik stationär',txt:`Diagnose: Kutis-/Dermatolipektomie Bauch. Abdominoplastik + WARP.
Periop. AB: Clindamycin 600mg 1-1-1 i.v. Postop.: strickte Bettruhe + OKH-Lagerung. Drainage bei erhöhter Fördermenge bei Entlassung belassen. Thromboseprophylaxe: pneumatische Beinkompression periop.
Proc:
• Kurzes Abduschen ab 2. Woche postOP – Pflaster nicht aufweichen!
• Husten/Bauchpresse 6 Wochen vermeiden
• Kompressionskleidung: 6 Wochen konsequent Tag und Nacht
• Belastung >5kg ab 8. Woche. Nahtmaterial resorbierbar – Fadenenden am 12. Tag kürzen
• Narbenpflege: Bepanthen einmassieren 3× tägl. 2 Monate
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
 {lr:false,lbl:'Oberschenkelstraffung + Liposuction',txt:`OP: Oberschenkelstraffung bds. + angleichende Liposuction. Periop. AB: Cefuroxim 1,5g i.v. Kompressive Wicklung postop. Drainage bei Entlassung belassen (erhöhte Fördermenge). Clexane 40mg 0-0-1 s.c. bis Vollmobilisation.
Proc:
• Langes Sitzen und Abspreizen der Beine vermeiden. Toilettensitzerhöhung empfohlen
• Kompressionskleidung: 6 Wochen konsequent Tag und Nacht
• Belastung und längeres Gehen ab 4. Woche postop
• Abduschen ab 2. Woche postOP. Pflaster nicht aufweichen
• Nahtmaterial resorbierbar – Fadenenden am 12. Tag kürzen
• Narbenpflege: Bepanthen einmassieren 3× tägl. 2 Monate
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
 {lr:false,lbl:'Pannikulektomie + VAC',txt:`OP: Pannikulektomie. Periop. AB: Clindamycin 600mg i.v. VAC an lateralen Wundrändern bis ___. Wundränder lateral sekundär heilend (VAC). Thromboseprophylaxe pneumatisch periop.
Proc:
• Laterale Wundränder nicht verschlossen → Sekundärheilung / ggf. Sekundärnaht angestrebt
• Pflegedienst: tägl. Wunddesinfektion + VAC-Wechsel 1×/Woche + Drain-Zug bei <30ml/Tag
• Kompressionskleidung: 6 Wochen (2 Bauchbinden bis dahin). Nahtmaterial resorbierbar
• Narbenpflege: Bepanthen einmassieren 3× tägl. 2 Monate
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
 {lr:false,lbl:'Mammaimplantat – Augmentation',txt:`Diagnose: Involutionsatrophie Mamma bds.
OP: Subpektorale/subfasziale Mammaaugmentationsplastik bds. mit Silikonprothesen (Dual Plane n. Tebbets). Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Drainagen zeitgerecht. Implantatpass ausgehändigt.
Proc:
• Kompressionskleidung: 6 Wochen konsequent Tag und Nacht
• Kein schweres Heben >5kg für 6 Wochen. Armbelastung ab 7. Woche
• Kurzes Abduschen möglich – Pflaster nicht aufweichen
• Nahtmaterial resorbierbar – Fadenenden am 14. Tag kürzen
• WV nach 3 und 6 Wochen, 3 und 6 Monaten.`},
 {lr:false,lbl:'Gynäkomastie – PAL + subkutane Mastektomie',txt:`OP: Power-Assisted Liposuktion + subkutane Mastektomie + periareoläre Straffung bds. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Drainagen zeitgerecht.
Proc:
• Kompressionskleidung: 6 Wochen konsequent Tag und Nacht
• Kein schweres Heben >5kg für 6 Wochen. Armbelastung ab 7. Woche
• Kurzes Abduschen ab 2. Woche – Pflaster nicht aufweichen
• Nahtmaterial resorbierbar – Fadenenden am 12. Tag kürzen
• WV nach 3 und 6 Wochen, 3 und 6 Monaten. Tel: 09281/982530`},
 {lr:false,lbl:'Augenlid / Blepharoplastik / Entropium',txt:`OP: Blepharoplastik / Entropiumkorrektur (lat. Canthoplastik, tarsale Retraktorensuspension) bds. in Intubationsnarkose. Periop. AB lokal: Gentamycin Augentropfen.
Proc:
• Kühlung Augenlider mit Kühl-Packs für 3 Tage konsequent
• Schutz-Augenklappen (Uhrglas-Schutz) für 1 weitere Woche nachts bds.
• Gentamycin Augentropfen 5× tägl. je 3 Tropfen für 1 weitere Woche
• Fäden ex am 14. Tag. WV vereinbart.`},
 {lr:false,lbl:'Narbenkorrektur Gesicht',txt:`Proc nach Narbenkorrektur Gesicht:
• Kühlung konsequent für 48 h Tag und Nacht (mind. 3 Kühl-Packs abwechselnd)
• Kopftieflagerung für 48 h STRIKT VERBOTEN (z.B. Schuhe binden)
• Kein Gewicht heben (Koffer, Kind) für 48 h
• Schlafen mit OKH-Lagerung für 1 Nacht
• Pflasterwechsel und Fadenzug durch uns
• Duschen erst ab 5. Tag postop! Nicht manipulieren!
• Nach Fadenentfernung: 3× tägl. rückfettende Creme massieren für 1 Monat
• 2 weitere Monate: 1× tägl. Silikongel mit LSF (z.B. BabScar Care, Asclepios)
• Endgültiges Ergebnis nach 6 Monaten sichtbar`},
 {lr:false,lbl:'Periorale Verletzungen / Lippenrekonstruktion',txt:`OP: In Intubationsnarkose. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. DMS postop. regelrecht.
Proc:
• Weiterhin kühlen, keine Kopf-Tief-Haltung
• Keine harten Lebensmittel. Breiige Kost über Strohhalm für 7 Tage
• Keine Milchprodukte, Fruchtsäuren, Zitrusfrüchte, Kaffee für 7 Tage
• Keine Grimassen, kein weites Öffnen des Mundes für 7 Tage
• Fäden ex am 10. Tag. Bei resorbierbarem NM: keine Entfernung
• Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
]},
 
{id:'cp-verbr',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Verbrennung / Suprathel',snips:[
 {lr:false,lbl:'Verbrennung – Suprathel Nachsorge',txt:`Diagnose: Verbrennung ___Grad, ca. ___% KOF. OP: Chirurgische Wundreinigung, Blasenabtragung, temp. Weichteildeckung mit hydrolytisch resorbierbarer Membran (Suprathel®).
Proc:
• Erster VW NUR durch uns in unserer Sprechstunde am ___ Uhr!
• Wenn Verband sich löst: nur neu fixieren
• CAVE: Die auf der Haut haftende Matrix NICHT ENTFERNEN!
• Im Randbereich nicht mehr haftende Matrix ggf. zurückkürzen
• Ab Woche 3: Kompressionshandschuh für 6 Monate
• Narbenpflege: Bepanthen 3× tägl. 2 Monate nach Abheilung. Meidung Sonne 6 Monate
• WV nach 3 und 6 Wochen, 3 Monaten. Tel: 09281/982530`},
]},
 
{id:'cp-crps',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – CRPS / Nervenchirurgie',snips:[
 {lr:true,lbl:'CRPS stationäre Schmerzbehandlung',txt:`Diagnose: CRPS Typ I/II (M. Sudeck) re/li. Stationäre Akutschmerztherapie.
Maßnahmen: Schmerztherapeut mitbetreut. Stellatumblockaden (___×). Axillärer Naropin-Plexuskatheter. DMSO-Salbe mehrmals tägl. Prednisolon 100mg 1-0-0 für 1 Woche, dann in 20mg-Schritten ausschleichend. Gabapentin 100mg 1-1-1 (langsam bis max. 1800mg/d steigern). Amineurin 10mg 0-0-1. CO2-Bäder, Lymphdrainagen, Spiegeltherapie, Ergotherapie, TENS.
Proc: Gabapentin ambulant fortführen. Neurophysiologische Kontrolle N. ulnaris in 3 Monaten.`},
 {lr:false,lbl:'Interosseus-anterior-Syndrom',txt:`OP: Dekompression N. interosseus anterior in Larynxmaskenanästhesie. Periop. AB: Ampicillin/Sulbactam 2/1g i.v. Starke Schmerzen postop. – i.v. Analgesie indiziert.
Proc:
• Nahtmaterial resorbierbar – keine Entfernung. Schiene: 1 weitere Woche
• Dann Beübung + sensomotorisch-perzeptive Ergotherapie
• Belastungsaufbau ab 8. Woche. Neurologische Untersuchung in 2 Monaten
• Narbenpflege: Bepanthen 3× tägl. 2 Monate.`},
]},
 
{id:'cp-amb-osteosynthese',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – Osteosynthese ambulant / ME',snips:[
 {lr:true,lbl:'Osteosynthese ambulant – ME extern geplant',txt:`OP: In Fingerleitungsanästhesie/LMA. DMS postop. regelrecht. Entlassung gleicher Tag.
Proc:
• WV vereinbart. Röntgenkontrolle korrekte Materiallage
• Nach Rö-Kontrolle ambulante externe Weiterbehandlung. Bildgebung auf CD mitgegeben
• ME in Woche 6 bei niedergelassenem Chirurgen – zeitnahe Vorstellung empfohlen. Schiene bis ME belassen
• Dann aktiv-passive Beübung unter KG-Anleitung. Belastungsaufbau ab 8. Woche.`},
 {lr:true,lbl:'ME ambulant – K-Draht Entfernung',txt:`OP: Entfernung Osteosynthesematerial K-Draht in Infiltrationsanästhesie. DMS postop. regelrecht. Entlassung gleicher Tag.
Proc:
• Regelmäßige Wundkontrolle. Fäden ex 14. Tag (falls vorhanden)
• Ab sofort: aktiv-passive Beübung unter KG ohne Belastung 2 Wochen. Dann Belastungsaufbau.`},
]},

{id:'op-einl',dep:'cp',grp:'CP · OP-Berichte',lbl:'OP-Bericht – Einleitung / Standard',snips:[
 {lr:false,lbl:'Standard-Einleitung OP-Bericht CP',txt:`Die druckstellenfreie Patientenlagerung wird vom Operateur kontrolliert. Einsicht in die schriftliche Patientenaufklärung. Verifizierung der Seite. Steriles Abwaschen und Abdecken des Operationsfeldes nach Richtlinien des Hauses. Team Time Out. Single-Shot-Antibiotikaprophylaxe vor Anlage der Blutsperre nach Ausschluss Allergie. Anlage einer pneumatischen Oberarmblutsperre in der Einstellung 320 mmHg.`},
 {lr:false,lbl:'Becken – Spongiosaentnahme',txt:`Inzision mit 10er Messer am Becken, 2 cm dorsal der SIAS auf Spina iliaca. Präparation bis zum Knochen mit Elektromesser / Monopolare. Beckenkamm dargestellt. Deckelförmig nach cranial gestielter Kortikalisdeckel mit oszillierender Säge eröffnet. Entnahme ca. 3–4 qcm Spongiosa mit scharfem Löffel. Einlage Sulmycin-Schwamm 10×10cm. Einlage 12er Drainage. Schichtweiser Verschluss: 0er Vicryl CT1 als Fasziennaht, Monocryl 2-0 subcutan, Hautnaht.`},
 {lr:false,lbl:'CTS – OP-Bericht n. McKinnon',txt:`Ca. 3–4 cm longitudinale Inzision parallel zur Linea vitalis (n. McKinnon). Subcutis mittels bipolarer Diathermie koaguliert. Wundspreizer nach Adson. Scharfe Spaltung der Palmaraponeurose und des Retinaculum flexorum mit 15er Skalpell. N. medianus dargestellt – zeigt sich gefäßinjiziert als Zeichen der Kompression. Spaltung nach proximal unter direkter Sicht bis Unterarmfaszie komplettiert. Nerv völlig frei von Engpassstellen. Ramus muscularis dargestellt und geschont. Einlage Drainage. Wundverschluss 4-0 Ethilon. Steriler Verband. Schiene.`},
 {lr:false,lbl:'Four Corner Fusion / PRC + Beckenspongiosa',txt:`Rückenlage. Beckenspongiosa entnommen (s. Standardtext Becken). Zuwendung zur Hand. Geschwungene Hautinzision 8cm Lazy-S zentriert über der proximalen Handwurzelreihe mit 15er Skalpell. Präparation bis Retinaculum extensorum. EPL-Sehne aufgesucht, III. SSF nach proximal eröffnet. Retinaculum von radial nach ulnar bis V. SSF umgeschlagen. Strecksehnen geschont und angeschlungen. N. interosseus posterior 6cm proximal Proc. styl. radii identifiziert, mitsamt fibrovaskulärem Gewebe mittels bipolarer Koagulation exzidiert. Kapsulotomie n. Berger-Bishop mit radial-gestieltem Kapsellappen. Scaphoid frakturiert, mit Luer-Zange entfernt unter Schonung der long-radiolunate und radioscaphocapitate Ligamente. Spongiosa aufbewahrt. Lunatum-Joystick 1,4mm. Gelenkflächen zwischen Lunatum/Capitatum/Triquetrum/Hamatum entknorpelt mit Meisel und Dualcut-Säge. 4 Drähte 1,25mm in Ebenen Cap-Lun, Ham-Lun, Triq-Lun, Triq-Cap unter BV. Spongiosa kompressiv eingebracht. Rückkürzung und ggf. Umbiegen Drähte dorsal-subcutan. Rö-Dokumentation. Kapselnaht PDS 3-0 proximal fortlaufend, distal offen. EPL subcutan belassen. Strecksehnen reponiert, Retinaculum 4-0 PDS rekonstruiert. Drainage + Hautnaht 3-0 Ethilon. Gips.`},
 {lr:false,lbl:'Dupuytren – Fasziektomie Y-V n. Dellon',txt:`Markierung Dupuytren-Stränge mit Methylenblau + Y-V-Inzisionsmuster n. Dellon. Inzision und Lappenbildung. Palmaraponeurose von proximal nach distal von darunterliegenden Weichteilstrukturen abgelöst unter Schonung interdigitaler Gefäß-Nervenbündel D3-4 und D4-5. Spiralband stumpf abpräpariert. Beugesehnen und Ringbänder intakt abgelöst. Ligamentum natatorium: Nervenabgänge dargestellt. Im Grundglied: vollständige Strangentfernung nach Präparation GNB. Blutsperre eröffnet, offene Blutstillung. Y-V-Plastiken vervollständigt. Einlage Redondrainage. Wundverschluss 4-0/5-0 Ethilon. Steriler Verband. Gipsschiene.`},
 {lr:false,lbl:'Flexorensehne – Kernnaht n. Adelaide/Zechner',txt:`Narbe ausgeschnitten. Schnitt erweitert proximal und distal. GNB dargestellt. FDP D___ Zone ___ durchtrennt, proximaler Stumpf in Hohlhand disloziert. Mit Mosquito-Klemme hervorgeholt. Kernnaht n. Adelaide / n. Zechner mit 3-0 Prolene. Überwendlungsnaht 5-0 PDS. Spülung. Einlage Drainage. Wundverschluss 4-0 Ethilon. Steriler Verband. Gipsschiene.`},
 {lr:false,lbl:'Abdominoplastik + WARP – OP-Bericht',txt:`Rückenlage. Markierungen mit Methylenblau nachgezogen. Quere Inzision Unterbauchfalte mit 10er Skalpell. Adipocutaner Lappen auf vordere Rektusfaszie präpariert. Umbilicus mit Stiel verschont. Präparation bis Rippenbogen und Proc. xiphoideus. WARP (Weite Abdominale Rectus Plicatur) mit 2er Vicryl. Patientin auf 40° aufgesetzt. Neoumbilicus bestimmt, invertiertes V inzidiert, Subcutangewebe mit Metzenbaum-Schere ausgedünnt. Umbilicus mit 2-0 PDS an Bauchwand fixiert. Unter Traktion Dermolipektomie durchgeführt. Ausspülung. Minutiöse Blutstillung. Einlage 2× 14er Redondrainagen. Schichtweiser Verschluss: 2-0 Vicryl, 2-0/3-0/4-0 Monocryl. Steriler Verband. Kompressionsmieder.`},
 {lr:false,lbl:'Mammaimplantat Dual Plane – OP-Bericht',txt:`Inzisionen bilateral ca. 4–5cm lateral der Mittellinie. Haut und Fettgewebe durchtrennt. Präparation auf Pectoralis-Faszie, Dual Plane n. Tebbets. M. pectoralis major auf Höhe Areola durchtrennt. Submuskuläre Tasche gebildet bds. mit Monopolare. Sizer: re ___cc, li ___cc – zufriedenstellendes Ergebnis. Taschen mit Octenisept gespült, Handschuhwechsel. Keller-Funnel-Einbringung der Implantate. Patientin aufgesetzt. Submammarfalte mit 2-0 Monocryl mehrschichtig rekonstruiert. Drainagen eingelegt. Verband.`},
 {lr:false,lbl:'Arthroskopie Handgelenk – Befund + Shaver',txt:`Fingerextensionsvorrichtung, Traktion 6 kg. Blutleere 320 mmHg. Portale 3-4 und 6R markiert. 20G-Kanüle, Ringer-Injektion bestätigt intraartikuläre Lage. 11er Messer, Trokar und Optik 3-4-Portal. Befund:
– Fossa scaphoidea / lunata: intakte Gelenkfläche
– Radialer Recessus: Synovialitis/Gefäßinjektion
– SL-Band + Watson: kein Anhalt SL-Dissoziation
– Recessus ulnaris/TFCC: ausgeprägte Synovialitis, Discus aufgespannt, pos. Trampolineffekt, degenerative Discusläsion
Mit Shaver 3,0mm Dissector radikales Debridement aller pathologischer Strukturen, elektrothermische Synovialektomie mit Denervierung. Spülung. Wundverschluss 5-0 Ethilon. Lipotalon 10mg, Naropin 7,5mg. Gipsschiene.`},
]},
 
{id:'cp-osteosyn',dep:'cp',grp:'CP · Arztbrief',lbl:'CP – SL-Band / Scaphoid / Rhizarthrose',snips:[

Radiologisch: erweiterte skapholunäre Distanz ~3,5mm (Gegenseite 2,5mm, Normwert ≤3mm). Positives Terry-Thomas-Zeichen. Seitenaufnahme: keine DISI-Deformität.
Watson-Test: angedeutet positiv.
Empfehlung: 6 Wochen Ruhigstellung in Daumengips. Bei Beschwerdepersistenz: Handgelenksarthroskopie zur definitiven Diagnostik. Gegen SL-Banddissoziation besteht heute keine adäquate OP-Methode – konservative Therapie ausschöpfen.`},
 {lr:true,lbl:'Ulnare Distorsion / TFCC-Verdacht',txt:`Distorsionsverletzung Handgelenk re/li. Klinisch: Schmerzsymptomatik ulnar. Fovea-Zeichen: positiv. Impingement-Test: positiv. Radiologisch: dynamischer Ulna-Vorschub.

 {lr:true,lbl:'Rhizarthrose – Trapeziektomie + TightRope',txt:`Diagnose: Rhizarthrose Sattelgelenk re/li (CMC I-Arthrose). OP: Trapeziektomie, Denervierung Gelenkäste A. radialis, Suspensionsplastik n. Tight-Rope + Palmaris-longus-Sehne. Periop. AB: Cefuroxim 1,5g i.v.

 {lr:false,lbl:'SLAC/SNAC – Probedenervierung Xylocain',txt:`Seit ca. ___ Monaten beklagt der Patient Schwellung und Schmerzen am radialen Handgelenk und Sattelgelenk. Trauma nicht erinnerlich. Kein Rheuma, kein Gicht.
Klinisch: Stauungsschmerzen radial. Radiologisch: fortgeschrittene Radiokarpalarthrose mit DISI-Deformität im Sinne eines SLAC Wrist Stadium ___. Zudem Rhizarthrose.
Leidensdruck: moderat. Probedenervierung heute mit 4ml Xylocain durchgeführt. Patient berichtet über Besserung der Symptomatik. Über operative Therapiemöglichkeiten (Denervierung, Teilarthrodese, Prothese) ausführlich gesprochen.`},
 {lr:true,lbl:'Digitus saltans – Kortisoninjektion',txt:`Seit ___ Monaten: schmerzhafte Bewegungseinschränkung D___ re/li mit Digitus-saltans-Phänomen. Heute Kortisoninjektion (Lipotalon) vorgenommen. Sollte nach 3 Wochen keine Besserung eingetreten sein → Wiedervorstellung zur operativen Planung (Ringbandspaltung). Für Rückfragen stehen wir Ihnen jederzeit zur Verfügung.`},

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let collapsed={}, query='', dep='all';
let oaiKey=localStorage.getItem('oai_key')||'';
const chatHistory=[];
 
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(text,q){
  if(!q)return esc(text);
  const r=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc(text).replace(r,m=>`<mark>${m}</mark>`);
}
 
// NAV
function buildNav(){
  const nav=document.getElementById('nav-scroll');
  nav.innerHTML='';
  const grps={};
  DATA.forEach(s=>{if(!grps[s.grp])grps[s.grp]=[];grps[s.grp].push(s);});
  Object.keys(grps).forEach(g=>{
    const lbl=document.createElement('div');lbl.className='nav-group';lbl.textContent=g;nav.appendChild(lbl);
    grps[g].forEach(s=>{
      const b=document.createElement('button');
      b.className='nav-btn '+(s.dep==='cp'?'cp':s.dep==='cu'?'cu':'');
      b.dataset.id=s.id;b.textContent=s.lbl;
      b.onclick=()=>{
        document.getElementById('sec-'+s.id)?.scrollIntoView({behavior:'smooth',block:'start'});
        document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
      };
      nav.appendChild(b);
    });
  });
}
function filterNav(v){
  const q=v.toLowerCase();
  document.querySelectorAll('.nav-btn').forEach(b=>{b.style.display=!q||b.textContent.toLowerCase().includes(q)?'':'none';});
}
 
// DEP FILTER
function setDep(d){
  dep=d;
  document.getElementById('t-all').className='dep-tab t-all'+(d==='all'?' on':'');
  document.getElementById('t-cp').className='dep-tab t-cp'+(d==='cp'?' on':'');
  document.getElementById('t-cu').className='dep-tab t-cu'+(d==='cu'?' on':'');
  render();
}
function doSearch(v){query=v.trim();render();}
 
// COPY
function copyTxt(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('ok');btn.textContent='✓ Kopiert';
    setTimeout(()=>{btn.classList.remove('ok');btn.textContent='Kopieren';},1500);
  });
}
function lrCopy(text,side,btn){
  const t=text.replace(/re\/li/g,side).replace(/rechts\/links/gi,side==='re'?'rechts':'links');
  navigator.clipboard.writeText(t).then(()=>{const o=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=o,1200);});
}
 
// RENDER
function render(){
  const area=document.getElementById('content');
  area.innerHTML='';
  const q=query.toLowerCase();
  let vis=0;
 
  DATA.forEach(sec=>{
    if(dep!=='all'&&sec.dep!==dep)return;
    const realSnips=sec.snips.filter(s=>s.txt);
    const match=!q||realSnips.some(s=>s.txt.toLowerCase().includes(q)||s.lbl?.toLowerCase().includes(q))||sec.lbl.toLowerCase().includes(q);
    if(!match)return;
    vis++;
 
    const card=document.createElement('div');card.className='sec';card.id='sec-'+sec.id;
    const isOpen=collapsed[sec.id]!==false;
    const hc=sec.dep==='cp'?'h-cp':sec.dep==='cu'?'h-cu':'h-gen';
    const bc=sec.dep==='cp'?'b-cp':sec.dep==='cu'?'b-cu':'b-gen';
    const bt=sec.dep==='cp'?'Plastische':sec.dep==='cu'?'Unfallchir.':'Allgemein';
 
    const hdr=document.createElement('div');hdr.className='sec-hdr '+hc;
    hdr.innerHTML=`<span class="sec-title"><span class="badge ${bc}">${bt}</span>${esc(sec.lbl)}</span><span class="chev ${isOpen?'open':''}">▼</span>`;
    hdr.onclick=()=>{collapsed[sec.id]=collapsed[sec.id]===false;render();};
    card.appendChild(hdr);
 
    if(isOpen){
      const mlSnip=sec.snips.find(s=>s.ml);
      if(mlSnip&&ML[mlSnip.ml]){
        const box=document.createElement('div');box.className='ml-box';
        box.innerHTML=`<div class="ml-t">⚖ Medicolegal / Rechtlicher Hinweis</div>${esc(ML[mlSnip.ml])}`;
        card.appendChild(box);
      }
      const list=document.createElement('div');list.className='snips';
      realSnips.forEach(sn=>{
        const m2=!q||sn.txt.toLowerCase().includes(q)||sn.lbl?.toLowerCase().includes(q)||sec.lbl.toLowerCase().includes(q);
        if(!m2)return;
        const wrap=document.createElement('div');wrap.className='snip';
        const body=document.createElement('div');body.className='snip-body';
        if(sn.lbl){const l=document.createElement('div');l.className='snip-lbl';l.textContent=sn.lbl;body.appendChild(l);}
        const pre=document.createElement('div');pre.className='snip-txt';pre.innerHTML=hl(sn.txt,query);
        body.appendChild(pre);wrap.appendChild(body);
        const acts=document.createElement('div');acts.className='snip-acts';
        if(sn.lr){
          const row=document.createElement('div');row.className='lr-row';
          ['re','li','bds.'].forEach(s=>{
            const b=document.createElement('button');
            b.className='lrbtn '+(s==='re'?'lr-re':s==='li'?'lr-li':'lr-bds');
            b.textContent=s.toUpperCase();b.title='Text für '+s+' kopieren';
            b.onclick=(e)=>{e.stopPropagation();lrCopy(sn.txt,s,b);};
            row.appendChild(b);
          });
          acts.appendChild(row);
        }
        const cb=document.createElement('button');cb.className='cpbtn';cb.textContent='Kopieren';
        cb.onclick=(e)=>{e.stopPropagation();copyTxt(sn.txt,cb);};
        acts.appendChild(cb);
        wrap.appendChild(acts);
        wrap.onclick=()=>copyTxt(sn.txt,cb);
        list.appendChild(wrap);
      });
      card.appendChild(list);
    }
    area.appendChild(card);
  });
 
  document.getElementById('cnt').textContent=q?`${vis} Treffer`:DATA.filter(s=>dep==='all'||s.dep===dep).length+' Kategorien';
}
 
// CHAT
let chatVisible=false;
function toggleChat(){
  chatVisible=!chatVisible;
  document.getElementById('chat-panel').classList.toggle('hidden',!chatVisible);
}
function saveKey(){
  oaiKey=document.getElementById('chat-key').value.trim();
  localStorage.setItem('oai_key',oaiKey);
  addMsg('API-Key gespeichert (lokal). Jetzt Fragen stellen.','sys');
}
async function sendChat(){
  const inp=document.getElementById('chat-in');
  const txt=inp.value.trim();if(!txt)return;inp.value='';
  if(!oaiKey){addMsg('Bitte zuerst OpenAI API-Key eingeben.','sys');return;}
  addMsg(txt,'user');chatHistory.push({role:'user',content:txt});
  const th=addMsg('…','ai');
  try{
    const r=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+oaiKey},
      body:JSON.stringify({
        model:'gpt-4o',max_tokens:1000,
        messages:[{role:'system',content:`Du bist ein erfahrener Facharzt in Plastischer, Rekonstruktiver und Ästhetischer Chirurgie und Unfallchirurgie. Du hilfst Dr. Luis Perez Rojas (Assistenzarzt CP, Sana Klinikum Hof, unter Prof. Polykandriotis FAU Erlangen-Nürnberg) bei klinischen Fragen, Arztbriefen, OP-Berichten und medizinischer Literatur. Antworte präzise und direkt auf Deutsch. Kein langes Präambel. Bei PubMed-Fragen: konkrete Leitlinien oder Studien (AWMF, DGU, DGPRÄC, IFSSH). Context: CP Sana Hof, Handbedingungen, Sehnennaht Kleinert, Lappenplastik, Mikrochirurgie, Unfallchirurgie, ABCDE, Ottawa-Kriterien, Frakturen.`},
        ...chatHistory]
      })
    });
    const d=await r.json();
    const rep=d.choices?.[0]?.message?.content||d.error?.message||'Fehler.';
    th.textContent=rep;chatHistory.push({role:'assistant',content:rep});
  }catch(e){th.textContent='Verbindungsfehler: '+e.message;}
}
function addMsg(txt,role){
  const box=document.getElementById('chat-msgs');
  const m=document.createElement('div');m.className='msg '+role;m.textContent=txt;
  box.appendChild(m);box.scrollTop=box.scrollHeight;return m;
}
document.getElementById('chat-in').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
});
if(oaiKey)document.getElementById('chat-key').value='sk-…gespeichert';
 
// INIT
buildNav();render();
</script>
</body>
</html>
