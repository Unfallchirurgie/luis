<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Luis Perez Rojas · Chirurgie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf8f4;--cream2:#f2ede4;--cream3:#e8e0d0;
  --dark:#1a1612;--dark2:#2c2620;--dark3:#3d342c;
  --gold:#b8965a;--gold2:#d4ab6a;--gold3:#f0c878;
  --copper:#8b6340;
  --text1:#1a1612;--text2:#5a4e3c;--text3:#8a7a64;--text4:#b8a890;
  --cp:#2d4a6b;--cp2:#3a5f8a;--cp3:#e8f0f8;
  --cu:#4a2d1a;--cu2:#7a4a2a;--cu3:#f8f0e8;
  --border:#d4c8b0;--border2:#e8dfc8;
  --font:'DM Sans',sans-serif;--serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
  --shadow:0 2px 20px rgba(26,22,18,0.08);
  --shadow2:0 8px 40px rgba(26,22,18,0.12);
}
html,body{height:100%;overflow:hidden;background:var(--cream);color:var(--text1);font-family:var(--font);font-size:13px}

/* LAYOUT */
#shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:240px;flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--dark3)}
#brand{padding:24px 20px 18px;border-bottom:1px solid var(--dark3)}
#brand-name{font-family:var(--serif);font-size:15px;font-weight:300;color:var(--cream);letter-spacing:.15em;text-transform:uppercase;line-height:1.4}
#brand-sub{font-size:10px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;margin-top:4px}
#brand-rule{width:28px;height:1px;background:var(--gold);margin-top:12px}
#side-search-wrap{padding:12px 14px;border-bottom:1px solid var(--dark3)}
#side-search{width:100%;background:var(--dark3);border:1px solid #4a4036;border-radius:4px;color:var(--cream2);font-family:var(--font);font-size:11px;padding:6px 10px;outline:none;letter-spacing:.02em}
#side-search:focus{border-color:var(--gold)}
#side-search::placeholder{color:var(--text3)}
#nav-list{flex:1;overflow-y:auto;padding:8px 0}
#nav-list::-webkit-scrollbar{width:2px}
#nav-list::-webkit-scrollbar-thumb{background:var(--dark3)}
.nav-group{padding:14px 16px 4px;font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.2em;text-transform:uppercase}
.nav-item{display:block;width:100%;background:none;border:none;border-left:2px solid transparent;padding:7px 16px;font-family:var(--font);font-size:11.5px;color:var(--text4);text-align:left;cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
.nav-item:hover{color:var(--cream);background:var(--dark3)}
.nav-item.active{color:var(--gold2);border-left-color:var(--gold);background:rgba(184,150,90,0.08)}
.nav-item.cp-style{color:#7aadd4}
.nav-item.cp-style.active{color:var(--gold2);border-left-color:var(--gold)}
.nav-item.cu-style{color:#c49060}
.nav-item.cu-style.active{color:var(--gold2);border-left-color:var(--gold)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--cream)}

/* TOPBAR */
#topbar{background:var(--cream);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#search-wrap{flex:1;position:relative}
#search-wrap input{width:100%;background:var(--cream2);border:1px solid var(--border);border-radius:3px;color:var(--text1);font-family:var(--font);font-size:12px;padding:7px 12px 7px 32px;outline:none;transition:border-color .15s;letter-spacing:.01em}
#search-wrap input:focus{border-color:var(--gold);background:white}
#search-wrap input::placeholder{color:var(--text3)}
#search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.top-badge{font-size:10px;color:var(--text3);letter-spacing:.05em;white-space:nowrap}
#chat-btn{background:var(--dark);border:none;border-radius:3px;color:var(--gold2);font-family:var(--font);font-size:11px;padding:7px 16px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;white-space:nowrap}
#chat-btn:hover{background:var(--dark2);color:var(--gold3)}
.dep-tabs{display:flex;gap:6px}
.dep-tab{background:none;border:1px solid var(--border2);border-radius:3px;padding:5px 12px;font-family:var(--font);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;color:var(--text2)}
.dep-tab.active-cp{background:var(--cp3);border-color:var(--cp2);color:var(--cp)}
.dep-tab.active-cu{background:var(--cu3);border-color:var(--cu2);color:var(--cu)}
.dep-tab:hover{border-color:var(--gold)}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* SECTION CARD */
.sec{background:white;border:1px solid var(--border2);border-radius:4px;overflow:hidden;scroll-margin-top:8px;box-shadow:var(--shadow)}
.sec:hover{border-color:var(--border);box-shadow:var(--shadow2)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border2)}
.sec-hdr.cp-hdr{background:linear-gradient(90deg,var(--cp3),white)}
.sec-hdr.cu-hdr{background:linear-gradient(90deg,var(--cu3),white)}
.sec-hdr.gen-hdr{background:linear-gradient(90deg,#f5f2ec,white)}
.sec-title{font-family:var(--serif);font-size:14px;font-weight:400;color:var(--text1);display:flex;align-items:center;gap:10px;letter-spacing:.02em}
.dep-badge{font-family:var(--font);font-size:9px;font-weight:500;padding:2px 8px;border-radius:2px;letter-spacing:.1em;text-transform:uppercase}
.dep-badge.cp{background:var(--cp3);color:var(--cp)}
.dep-badge.cu{background:var(--cu3);color:var(--cu)}
.dep-badge.gen{background:var(--cream2);color:var(--text3)}
.sec-chev{color:var(--text3);font-size:11px;transition:transform .2s;font-family:sans-serif}
.sec-chev.open{transform:rotate(180deg)}

/* SNIPPET */
.snip-list{padding:10px}
.snip{display:flex;gap:10px;padding:10px 12px;border-radius:3px;cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:6px;align-items:flex-start}
.snip:hover{background:var(--cream2);border-color:var(--border2)}
.snip:last-child{margin-bottom:0}
.snip-body{flex:1;min-width:0}
.snip-label{font-size:9.5px;font-weight:500;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;font-family:var(--font)}
.snip-text{font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.65;white-space:pre-wrap;word-break:break-word}
.snip-text mark{background:rgba(184,150,90,0.2);color:var(--copper);border-radius:2px}
.snip-acts{flex-shrink:0;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.copy-btn{background:var(--cream2);border:1px solid var(--border);border-radius:3px;padding:4px 10px;color:var(--text2);font-family:var(--font);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap;letter-spacing:.04em}
.copy-btn:hover{background:var(--dark);color:var(--gold2);border-color:var(--dark)}
.copy-btn.ok{color:white;background:#5a8a5a;border-color:#5a8a5a}
.lr-row{display:flex;gap:4px}
.lr-btn{flex:1;background:white;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-family:var(--font);font-size:9.5px;font-weight:500;cursor:pointer;text-align:center;transition:all .12s;letter-spacing:.05em}
.lr-btn.re{color:var(--cp2)}.lr-btn.re:hover{background:var(--cp3);border-color:var(--cp2)}
.lr-btn.li{color:#7a4a2a}.lr-btn.li:hover{background:var(--cu3);border-color:var(--cu2)}
.lr-btn.bds{color:var(--text3);font-size:8.5px}.lr-btn.bds:hover{background:var(--cream3);border-color:var(--border)}
.sub-lbl{font-size:9px;font-weight:500;color:var(--gold);padding:8px 12px 2px;letter-spacing:.15em;text-transform:uppercase;font-family:var(--font)}

/* MEDICOLEGAL BOX */
.ml-box{background:#fffbe8;border:1px solid #e8d870;border-radius:3px;padding:10px 14px;margin:10px;font-size:11px;color:#7a6a00;line-height:1.6}
.ml-title{font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#a09000;margin-bottom:5px}

/* CHAT PANEL */
#chat-panel{width:370px;flex-shrink:0;background:white;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#chat-panel.hidden{display:none}
#chat-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--dark)}
#chat-hdr-title{font-family:var(--serif);font-size:15px;font-weight:300;color:var(--gold2);letter-spacing:.1em}
#chat-hdr-sub{font-size:9px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
#chat-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}
#chat-close:hover{color:var(--cream)}
#chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--cream)}
#chat-msgs::-webkit-scrollbar{width:2px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--border)}
.msg{max-width:88%;padding:9px 12px;border-radius:4px;font-size:12px;line-height:1.65}
.msg.user{background:var(--dark);color:var(--cream2);align-self:flex-end;border-radius:4px 4px 1px 4px}
.msg.ai{background:white;border:1px solid var(--border);color:var(--text1);align-self:flex-start;border-radius:4px 4px 4px 1px}
.msg.sys{background:rgba(184,150,90,0.1);border:1px solid var(--border2);color:var(--text3);align-self:center;font-size:10px;text-align:center;letter-spacing:.02em;padding:6px 12px}
#chat-footer{padding:12px;border-top:1px solid var(--border);background:white}
#chat-key-wrap{margin-bottom:8px;display:flex;gap:6px}
#chat-key{flex:1;background:var(--cream2);border:1px solid var(--border);border-radius:3px;color:var(--text1);font-family:var(--mono);font-size:10px;padding:5px 8px;outline:none}
#chat-key:focus{border-color:var(--gold)}
#chat-key::placeholder{color:var(--text3)}
.key-save{background:var(--dark);border:none;border-radius:3px;color:var(--gold2);font-family:var(--font);font-size:10px;padding:5px 10px;cursor:pointer;letter-spacing:.05em}
#chat-in-wrap{display:flex;gap:6px}
#chat-in{flex:1;background:var(--cream2);border:1px solid var(--border);border-radius:3px;color:var(--text1);font-family:var(--font);font-size:12px;padding:8px 10px;outline:none;resize:none;min-height:38px;max-height:80px}
#chat-in:focus{border-color:var(--gold);background:white}
#chat-send{background:var(--dark);border:none;border-radius:3px;color:var(--gold2);font-size:16px;padding:0 14px;cursor:pointer;transition:all .15s}
#chat-send:hover{background:var(--dark2);color:var(--gold3)}

.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:12px;letter-spacing:.05em}
</style>
</head>
<body>
<div id="shell">

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="brand">
    <div id="brand-name">Dr. Luis Perez Rojas</div>
    <div id="brand-sub">Plastische · Unfallchirurgie</div>
    <div id="brand-rule"></div>
  </div>
  <div id="side-search-wrap">
    <input id="side-search" type="text" placeholder="Navigation filtern…" oninput="filterNav(this.value)">
  </div>

</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div class="dep-tabs">

<!-- CHAT -->
<div id="chat-panel" class="hidden">

      <div id="chat-hdr-title">KI-Assistent</div>
      <div id="chat-hdr-sub">ChatGPT · Medizin</div>
    </div>
    <button id="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-msgs">
    <div class="msg sys">Medizinischer Assistent für Plastische Chirurgie &amp; Unfallchirurgie.<br>OpenAI API-Key eingeben um zu starten.</div>
  </div>
  <div id="chat-footer">
    <div id="chat-key-wrap">
      <input id="chat-key" type="password" placeholder="sk-… OpenAI API Key (lokal, nicht gespeichert)">

      <button id="chat-send" onclick="sendChat()">↑</button>
    </div>
  </div>
</div>

</div>

const MEDICOLEGAL = {

  sht: `⚠ SHT/Kopftrauma: Ottawa-Kriterien und NICE-Leitlinie dokumentieren. Bei Kindern <2J immer CT-Indikation prüfen. Intoxikation und Amnesie als Risikofaktoren explizit aufführen. Eltern-Aufklärung schriftlich mit Merkblatt belegen.`,
  kind: `⚠ Kinder: Alter, Gewicht, Impfstatus (Tetanus) und Begleitung dokumentieren. Kindesmisshandlung (NAI) aktiv ausschließen – Verletzungsmuster mit Unfallmechanismus abgleichen. Bei Diskrepanz Kinderschutzteam einbeziehen.`,
  alt: `⚠ Ältere Patienten: Sturzursache klären (kardial, neurologisch, medikamentös). Antikoagulation dokumentieren. Bei Schenkelhals- oder Wirbelkörperfraktur immer Osteoporose-Assessment und ggf. Osteodensitometrie empfehlen.`,

const SECTIONS = [

{id:'poly-kind',dep:'cu',group:'Unfallchirurgie · Befund',label:'Kopfprellung Kind – unauffällig',snippets:[

  {lr:false,label:'Befund + Proc ambulant (Kind)',text:`Anamnese: ${new Date().toLocaleDateString('de')} – Kind ___ Jahre, Körpergewicht ca. ___ kg, Sturz vom ___/Schlag gegen ___. Begleitung durch Elternteil/Sorgeberechtigten. Unfallmechanismus mit Verletzungsmuster vereinbar: Ja. Keine Hinweise auf nicht-akzidentelle Verletzung.

HWS: Kopf freibeweglich, kein Druck-/Klopfschmerz. Keine Ruhigstellungsindikation.
Keine Kopfschmerzen, keine Übelkeit, kein Erbrechen, keine Bewusstlosigkeit, keine Amnesie.
SpO2: ___%, Herzfrequenz: ___/min, RR: ___/___mmHg.

Bildgebung: CCT nicht indiziert (NICE/PECARN-Kriterien negativ). Keine Röntgenaufnahmen.

• Kein Sport, keine Bildschirmzeit für 24 h
• Analgesie: Paracetamol 15 mg/kg KG p.o. bei Bedarf (KEIN Ibuprofen/ASS in 1. 24 h)
• Bei Alarmzeichen (Erbrechen ≥2×, starke Kopfschmerzen, Bewusstseinstrübung, Krampfanfall, Pupillenasymmetrie, Taubheitsgefühl): 112 anrufen oder sofortige Wiedervorstellung
• Merkblatt SHT / Kopfverletzung Kind ausgehändigt – von Elternteil bestätigt: Ja
• Wiedervorstellung in unserer Notaufnahme bei Alarmzeichen jederzeit möglich`},
]},

{id:'poly-alt',dep:'cu',group:'Unfallchirurgie · Befund',label:'Sturz Älterer – CT-Indikation',snippets:[
  {ml:'alt'},
  {lr:false,label:'Sturz Älterer – Vollbefund + CT-Dokumentation',text:`Anamnese: Sturz am ___ aus dem Stand/vom ___. Sturzursache: unklar/Schwäche/Schwindel/Synkope/Stolpern. Vorbekannte Antikoagulation: ___ (zuletzt eingenommen: ___). Vorerkrankungen: ___. Aktuelle Medikation: ___ (vollständige Liste angehängt). Tetanusschutz: ___.

{id:'poly-unfallhergang',dep:'cu',group:'Unfallchirurgie · Befund',label:'Polytrauma · HWS-Distorsion nach Unfall',snippets:[

// ══════════════════════════════════════════════════════
//  ZUSTAND
// ══════════════════════════════════════════════════════
let collapsed={}, query='', dep='all', chatVisible=false;
let openAIKey = localStorage.getItem('oai_key')||'';
const chatHist=[];

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function buildNav(){
  const nav=document.getElementById('nav-list');
  nav.innerHTML='';
  const grps={};
  SECTIONS.forEach(s=>{if(!grps[s.group])grps[s.group]=[];grps[s.group].push(s);});
  Object.keys(grps).forEach(g=>{
    const lbl=document.createElement('div');lbl.className='nav-group';lbl.textContent=g;nav.appendChild(lbl);
    grps[g].forEach(s=>{
      const btn=document.createElement('button');
      btn.className=`nav-item${s.dep==='cp'?' cp-style':s.dep==='cu'?' cu-style':''}`;
      btn.dataset.id=s.id;btn.textContent=s.label;
      btn.onclick=()=>{document.getElementById('sec-'+s.id)?.scrollIntoView({behavior:'smooth',block:'start'});setActive(s.id);};
      nav.appendChild(btn);
    });
  });
}
function setActive(id){document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.id===id));}
function filterNav(v){
  const q=v.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(b=>{b.style.display=!q||b.textContent.toLowerCase().includes(q)?'':'none';});
}

// ══════════════════════════════════════════════════════
//  DEPARTMENT FILTER
// ══════════════════════════════════════════════════════
function setDep(d){
  dep=d;
  document.getElementById('tab-all').className='dep-tab'+(d==='all'?' active-cu':'');
  document.getElementById('tab-cp').className='dep-tab'+(d==='cp'?' active-cp':'');
  document.getElementById('tab-cu').className='dep-tab'+(d==='cu'?' active-cu':'');
  buildContent();
}

// ══════════════════════════════════════════════════════
//  SUCHE
// ══════════════════════════════════════════════════════
function filterContent(v){query=v.trim();buildContent();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(text,q){
  if(!q)return esc(text);
  const r=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc(text).replace(r,m=>`<mark>${m}</mark>`);
}

// ══════════════════════════════════════════════════════
//  COPY
// ══════════════════════════════════════════════════════
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('ok');btn.textContent='✓ Kopiert';
    setTimeout(()=>{btn.classList.remove('ok');btn.textContent='Kopieren';},1500);
  });
}
function lrCopy(text,side,btn){
  const t=text.replace(/re\/li/g,side).replace(/rechts\/links/gi,side==='re'?'rechts':'links');
  navigator.clipboard.writeText(t).then(()=>{const orig=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=orig,1200);});
}

// ══════════════════════════════════════════════════════
//  BUILD CONTENT
// ══════════════════════════════════════════════════════
function buildContent(){
  const area=document.getElementById('content');
  area.innerHTML='';
  const q=query.toLowerCase();
  let vis=0;

  SECTIONS.forEach(sec=>{
    if(dep!=='all'&&sec.dep!==dep)return;
    const realSnips=sec.snippets.filter(sn=>sn.text);
    const ok=!q||realSnips.some(sn=>sn.text.toLowerCase().includes(q)||sn.label?.toLowerCase().includes(q)||sec.label.toLowerCase().includes(q));
    if(!ok)return;
    vis++;

    const card=document.createElement('div');card.className='sec';card.id='sec-'+sec.id;
    const isOpen=collapsed[sec.id]!==false;
    const hdrClass=sec.dep==='cp'?'cp-hdr':sec.dep==='cu'?'cu-hdr':'gen-hdr';
    const badgeClass=sec.dep==='cp'?'cp':sec.dep==='cu'?'cu':'gen';
    const badgeTxt=sec.dep==='cp'?'Plastische':sec.dep==='cu'?'Unfallchir.':'Allgemein';

    const hdr=document.createElement('div');hdr.className=`sec-hdr ${hdrClass}`;
    hdr.innerHTML=`<span class="sec-title"><span class="dep-badge ${badgeClass}">${badgeTxt}</span>${esc(sec.label)}</span><span class="sec-chev ${isOpen?'open':''}">▼</span>`;
    hdr.onclick=()=>{collapsed[sec.id]=collapsed[sec.id]===false;buildContent();};
    card.appendChild(hdr);

    if(isOpen){
      // Medicolegal hinweis
      const mlSnip=sec.snippets.find(s=>s.ml);
      if(mlSnip&&MEDICOLEGAL[mlSnip.ml]){
        const box=document.createElement('div');box.className='ml-box';
        box.innerHTML=`<div class="ml-title">⚖ Rechtlicher Hinweis / Medicolegal</div>${esc(MEDICOLEGAL[mlSnip.ml])}`;
        card.appendChild(box);
      }

      const list=document.createElement('div');list.className='snip-list';
      realSnips.forEach(sn=>{
        const ok2=!q||sn.text.toLowerCase().includes(q)||sn.label?.toLowerCase().includes(q)||sec.label.toLowerCase().includes(q);
        if(!ok2)return;
        const wrap=document.createElement('div');wrap.className='snip';

        const body=document.createElement('div');body.className='snip-body';
        if(sn.label){const l=document.createElement('div');l.className='snip-label';l.textContent=sn.label;body.appendChild(l);}
        const pre=document.createElement('div');pre.className='snip-text';pre.innerHTML=hl(sn.text,query);
        body.appendChild(pre);wrap.appendChild(body);

        const acts=document.createElement('div');acts.className='snip-acts';
        if(sn.lr){
          const row=document.createElement('div');row.className='lr-row';
          ['re','li','bds.'].forEach(s=>{
            const b=document.createElement('button');
            b.className=`lr-btn ${s==='re'?'re':s==='li'?'li':'bds'}`;
            b.textContent=s.toUpperCase();b.title='Für '+s+' kopieren';
            b.onclick=(e)=>{e.stopPropagation();lrCopy(sn.text,s,b);};
            row.appendChild(b);
          });
          acts.appendChild(row);
        }
        const cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Kopieren';
        cb.onclick=(e)=>{e.stopPropagation();copyText(sn.text,cb);};
        acts.appendChild(cb);
        wrap.appendChild(acts);
        wrap.onclick=()=>copyText(sn.text,cb);
        list.appendChild(wrap);
      });
      card.appendChild(list);
    }
    area.appendChild(card);
  });

  document.getElementById('cnt-badge').textContent=q?`${vis} Treffer`:`${vis} Kategorien`;
}

// ══════════════════════════════════════════════════════
//  CHAT
// ══════════════════════════════════════════════════════
function toggleChat(){
  chatVisible=!chatVisible;
  document.getElementById('chat-panel').classList.toggle('hidden',!chatVisible);
}
function saveKey(){
  openAIKey=document.getElementById('chat-key').value.trim();
  localStorage.setItem('oai_key',openAIKey);
  addMsg('API-Key gespeichert (lokal, nicht übertragen). Jetzt können Sie Fragen stellen.','sys');
}
async function sendChat(){
  const input=document.getElementById('chat-in');
  const text=input.value.trim();if(!text)return;input.value='';
  if(!openAIKey){addMsg('Bitte zuerst OpenAI API-Key eingeben.','sys');return;}
  addMsg(text,'user');
  chatHist.push({role:'user',content:text});
  const thinking=addMsg('…','ai');
  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+openAIKey},
      body:JSON.stringify({
        model:'gpt-4o',
        max_tokens:900,
        messages:[
          {role:'system',content:`Du bist ein erfahrener Facharzt in Plastischer, Rekonstruktiver und Ästhetischer Chirurgie sowie Unfallchirurgie. Du hilfst Dr. Luis Perez Rojas (Assistenzarzt, Sana Klinikum Hof, unter Prof. Polykandriotis) bei klinischen Fragen, Arztbriefen, OP-Berichten, Textbausteinen und medizinischer Literatur. Antworte präzise und direkt auf Deutsch. Keine langen Einleitungen. Wenn nach PubMed-Evidenz gefragt wird, gib konkrete Leitlinien oder Studien an (AWMF, DGU, DGPRÄC). Wichtige Stichwörter: Plastische Chirurgie Hof, CTS, Dupuytren, Sehnennaht Kleinert-Schema, Lappenplastik, Spalthaut, Unfallchirurgie, ABCDE, Ottawa-Kriterien, SHT, Frakturen Extremitäten.`},
          ...chatHist
        ]
      })
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||data.error?.message||'Fehler.';
    thinking.textContent=reply;
    chatHist.push({role:'assistant',content:reply});
  }catch(e){thinking.textContent='Verbindungsfehler: '+e.message;}
}
function addMsg(text,role){
  const box=document.getElementById('chat-msgs');
  const m=document.createElement('div');m.className='msg '+role;m.textContent=text;
  box.appendChild(m);box.scrollTop=box.scrollHeight;return m;
}
document.getElementById('chat-in').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
});

// Prefill key if saved
if(openAIKey){document.getElementById('chat-key').value='sk-…gespeichert';}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
buildNav();buildContent();
</script>
